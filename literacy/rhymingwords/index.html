<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Rhyming Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#fff;
}

/* ================= SCREENS ================= */

.screen{
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;
    display:none;
}

.active{
    display:flex;
}

/* ================= SLIDE 1 ================= */

#slide1{
    background:white;
    justify-content:center;
    align-items:center;
}

#slide1 img{
    width:min(60vw,260px);
    object-fit:contain;
}

/* ================= SLIDE 2 ================= */

#slide2{
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    overflow:hidden;
    position:relative;
    padding:6px;
    background:#fdf4fb;
}

/* Decorative Background */

.circle{
    position:absolute;
    border-radius:50%;
    opacity:0.45;
    z-index:0;
}

.c1{
    width:90px;
    height:90px;
    background:#ff8fab;
    top:-15px;
    left:-15px;
}

.c2{
    width:80px;
    height:80px;
    background:#ffd166;
    top:0;
    right:-10px;
}

.c3{
    width:70px;
    height:70px;
    background:#90dbf4;
    bottom:15%;
    right:-15px;
}

.c4{
    width:70px;
    height:70px;
    background:#ff85a1;
    bottom:20%;
    left:-10px;
}

.title{
    font-size:clamp(18px,4vw,34px);
    font-weight:900;
    color:#7b2cbf;
    margin-top:4px;
    margin-bottom:6px;
    z-index:5;
    text-align:center;
}

/* ================= GAME AREA ================= */

.game-container{
    position:relative;
    width:100%;
    flex:1;
    max-width:1000px;
}

.game-area{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    position:relative;
    z-index:2;
}

/* SVG LINES */

#lineSVG{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}

/* Columns */

.column{
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    gap:6px;
}

/* Cards */

.card{
    width:100%;
    background:#ffffffee;
    border-radius:18px;
    border:3px solid transparent;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:4px;
    cursor:pointer;
    position:relative;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
    transition:0.2s;
    min-height:88px;
}

.card img{
    width:min(13vw,54px);
    height:min(13vw,54px);
    object-fit:contain;
    pointer-events:none;
}

.label{
    margin-top:2px;
    font-size:clamp(13px,2vw,22px);
    font-weight:900;
    color:#222;
    text-transform:lowercase;
    pointer-events:none;
}

.card.selected{
    border-color:#ff4fa3;
    background:#fff0f7;
}

.card.correct{
    border-color:#32cd32;
    background:#eaffea;
}

/* Tick */

.tick{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:70px;
    color:#00c853;
    display:none;
    z-index:100;
}

/* ================= SLIDE 3 ================= */

#slide3{
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6e7,#fff5ba,#c8f7ff,#d9c2ff);
}

.goodjob{
    font-size:clamp(38px,10vw,90px);
    font-weight:900;
    color:#ff1493;
    text-shadow:2px 2px white;
    z-index:5;
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}

/* ================= MOBILE DEVICES ================= */

@media(max-width:900px){

    .title{
        font-size:26px;
    }

    .game-area{
        gap:6px;
    }

    .column{
        gap:5px;
    }

    .card{
        min-height:74px;
        border-radius:16px;
    }

    .card img{
        width:48px;
        height:48px;
    }

    .label{
        font-size:14px;
    }
}

@media(max-width:600px){

    #slide2{
        padding:4px;
    }

    .title{
        font-size:22px;
        margin-bottom:4px;
    }

    .game-area{
        gap:5px;
    }

    .column{
        gap:4px;
    }

    .card{
        min-height:66px;
        padding:3px;
    }

    .card img{
        width:40px;
        height:40px;
    }

    .label{
        font-size:12px;
    }

    .tick{
        font-size:55px;
    }
}

</style>
</head>

<body>

<!-- ================= SLIDE 1 ================= -->

<div id="slide1" class="screen active">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- ================= SLIDE 2 ================= -->

<div id="slide2" class="screen">

    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="circle c4"></div>

    <div class="title">Match the rhyming words</div>

    <div class="game-container">

        <!-- SVG FOR LINES -->

        <svg id="lineSVG"></svg>

        <div class="game-area">

            <!-- LEFT COLUMN -->

            <div class="column">

                <div class="card" data-word="dog">
                    <img src="assets/dog.png">
                    <div class="label">dog</div>
                </div>

                <div class="card" data-word="cap">
                    <img src="assets/cap.png">
                    <div class="label">cap</div>
                </div>

                <div class="card" data-word="bat">
                    <img src="assets/bat.png">
                    <div class="label">bat</div>
                </div>

                <div class="card" data-word="fan">
                    <img src="assets/fan.png">
                    <div class="label">fan</div>
                </div>

                <div class="card" data-word="fox">
                    <img src="assets/fox.png">
                    <div class="label">fox</div>
                </div>

            </div>

            <!-- RIGHT COLUMN -->

            <div class="column">

                <div class="card" data-word="hat">
                    <img src="assets/hat.png">
                    <div class="label">hat</div>
                </div>

                <div class="card" data-word="pan">
                    <img src="assets/pan.png">
                    <div class="label">pan</div>
                </div>

                <div class="card" data-word="box">
                    <img src="assets/box.png">
                    <div class="label">box</div>
                </div>

                <div class="card" data-word="log">
                    <img src="assets/log.png">
                    <div class="label">log</div>
                </div>

                <div class="card" data-word="tap">
                    <img src="assets/tap.png">
                    <div class="label">tap</div>
                </div>

            </div>

        </div>

    </div>

    <div class="tick" id="tick">✔</div>

</div>

<!-- ================= SLIDE 3 ================= -->

<div id="slide3" class="screen">
    <div class="goodjob">Good Job!</div>
</div>

<!-- ================= AUDIO ================= -->

<audio id="correctSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=correct-2-46134.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound">
    <source src="assets/wrong.mp3" type="audio/mpeg">
</audio>

<!-- ================= SCRIPT ================= -->

<script>

/* ================= SLIDE TRANSITION ================= */

setTimeout(() => {

    document.getElementById("slide1").classList.remove("active");
    document.getElementById("slide2").classList.add("active");

}, 3000);

/* ================= MATCHING ================= */

const pairs = {
    dog:"log",
    cap:"tap",
    bat:"hat",
    fan:"pan",
    fox:"box"
};

let selectedCard = null;
let matchedCount = 0;

const cards = document.querySelectorAll(".card");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const tick = document.getElementById("tick");

cards.forEach(card => {

    card.addEventListener("click", () => {

        if(card.classList.contains("correct")){
            return;
        }

        if(!selectedCard){

            selectedCard = card;
            card.classList.add("selected");
            return;
        }

        if(selectedCard === card){
            return;
        }

        const first = selectedCard.dataset.word;
        const second = card.dataset.word;

        if(pairs[first] === second){

            selectedCard.classList.remove("selected");

            selectedCard.classList.add("correct");
            card.classList.add("correct");

            drawLine(selectedCard, card);

            tick.style.display = "block";

            correctSound.currentTime = 0;
            correctSound.play();

            setTimeout(() => {
                tick.style.display = "none";
            }, 700);

            matchedCount++;

            if(matchedCount === 5){

                setTimeout(() => {
                    showFinalSlide();
                }, 1400);
            }

        } else {

            selectedCard.classList.remove("selected");

            wrongSound.currentTime = 0;
            wrongSound.play();
        }

        selectedCard = null;
    });

});

/* ================= DRAW LINE ================= */

function drawLine(card1, card2){

    const svg = document.getElementById("lineSVG");

    const rect1 = card1.getBoundingClientRect();
    const rect2 = card2.getBoundingClientRect();
    const svgRect = svg.getBoundingClientRect();

    /* Start point = right center of left card */
    const x1 = rect1.right - svgRect.left - 8;
    const y1 = rect1.top + rect1.height/2 - svgRect.top;

    /* End point = left center of right card */
    const x2 = rect2.left - svgRect.left + 8;
    const y2 = rect2.top + rect2.height/2 - svgRect.top;

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1", x1);
    line.setAttribute("y1", y1);
    line.setAttribute("x2", x2);
    line.setAttribute("y2", y2);

    line.setAttribute("stroke", "#00c853");
    line.setAttribute("stroke-width", "5");
    line.setAttribute("stroke-linecap", "round");

    svg.appendChild(line);
}

/* ================= FINAL SLIDE ================= */

function showFinalSlide(){

    document.getElementById("slide2").classList.remove("active");
    document.getElementById("slide3").classList.add("active");

    createConfetti();
}

/* ================= CONFETTI ================= */

function createConfetti(){

    const colors = [
        "#ff1493",
        "#ffd700",
        "#00c853",
        "#00b0ff",
        "#ff6d00",
        "#aa00ff"
    ];

    for(let i=0;i<100;i++){

        const confetti = document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left = Math.random()*100 + "vw";

        confetti.style.background = colors[Math.floor(Math.random()*colors.length)];

        confetti.style.animationDuration = (Math.random()*3 + 2) + "s";

        confetti.style.opacity = Math.random();

        document.getElementById("slide3").appendChild(confetti);
    }
}

</script>

</body>
</html>
