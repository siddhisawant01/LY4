<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Rhyming Words Game</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html,body{
        width:100%;
        height:100%;
        overflow:hidden;
        font-family: Arial, sans-serif;
        background:#fff;
    }

    .screen{
        width:100%;
        height:100vh;
        display:none;
        position:absolute;
        top:0;
        left:0;
    }

    .active{
        display:flex;
    }

    /* ---------------- SLIDE 1 ---------------- */

    #slide1{
        background:white;
        justify-content:center;
        align-items:center;
    }

    #slide1 img{
        width:min(60vw,320px);
        max-width:320px;
        object-fit:contain;
    }

    /* ---------------- SLIDE 2 ---------------- */

    #slide2{
        flex-direction:column;
        align-items:center;
        justify-content:flex-start;
        padding:10px;
        background:#fef6ff;
        overflow:hidden;
        position:relative;
    }

    /* Floral Background Decorations */

    .flower{
        position:absolute;
        border-radius:50%;
        opacity:0.9;
        z-index:0;
    }

    .flower1{
        width:90px;
        height:90px;
        background:#ffb3d9;
        top:10px;
        left:10px;
    }

    .flower2{
        width:70px;
        height:70px;
        background:#ffd166;
        top:20px;
        right:20px;
    }

    .flower3{
        width:80px;
        height:80px;
        background:#a0e7e5;
        bottom:20px;
        left:15px;
    }

    .flower4{
        width:90px;
        height:90px;
        background:#cdb4db;
        bottom:15px;
        right:15px;
    }

    .flower5{
        width:55px;
        height:55px;
        background:#ff8fab;
        top:45%;
        left:5px;
    }

    .flower6{
        width:55px;
        height:55px;
        background:#90dbf4;
        top:45%;
        right:5px;
    }

    .title{
        font-size:clamp(22px,4vw,36px);
        font-weight:900;
        color:#6a0572;
        margin-top:5px;
        margin-bottom:10px;
        z-index:2;
        text-align:center;
    }

    .game-area{
        width:100%;
        max-width:1100px;
        flex:1;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
        z-index:2;
        overflow:hidden;
    }

    .column{
        display:flex;
        flex-direction:column;
        justify-content:space-evenly;
        gap:8px;
    }

    .card{
        background:white;
        border-radius:18px;
        border:4px solid transparent;
        box-shadow:0 4px 10px rgba(0,0,0,0.12);
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        padding:8px;
        cursor:pointer;
        transition:0.2s;
        min-height:95px;
    }

    .card img{
        width:min(17vw,80px);
        height:min(17vw,80px);
        object-fit:contain;
        pointer-events:none;
    }

    .label{
        margin-top:4px;
        font-size:clamp(16px,2.2vw,24px);
        font-weight:bold;
        color:#333;
        text-transform:lowercase;
        pointer-events:none;
    }

    .card.selected{
        border-color:#ff69b4;
        transform:scale(1.03);
    }

    .card.correct{
        border-color:#32cd32;
        background:#eaffea;
    }

    .tick{
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        font-size:90px;
        color:#00c853;
        display:none;
        z-index:100;
        font-weight:bold;
    }

    /* ---------------- SLIDE 3 ---------------- */

    #slide3{
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:linear-gradient(135deg,#ffd6e7,#fff5ba,#c8f7ff,#d9c2ff);
        overflow:hidden;
    }

    .goodjob{
        font-size:clamp(42px,9vw,90px);
        font-weight:900;
        color:#ff1493;
        text-shadow:3px 3px white;
        z-index:5;
    }

    .confetti{
        position:absolute;
        width:12px;
        height:12px;
        animation:fall linear infinite;
    }

    @keyframes fall{
        from{
            transform:translateY(-100px) rotate(0deg);
        }
        to{
            transform:translateY(120vh) rotate(720deg);
        }
    }

    /* ---------------- MOBILE ---------------- */

    @media(max-width:700px){

        .game-area{
            gap:8px;
        }

        .card{
            min-height:82px;
            padding:5px;
        }

        .card img{
            width:58px;
            height:58px;
        }

        .label{
            font-size:16px;
        }

        .title{
            font-size:24px;
        }
    }
</style>
</head>

<body>

<!-- ================= SLIDE 1 ================= -->

<div id="slide1" class="screen active">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- ================= SLIDE 2 ================= -->

<div id="slide2" class="screen">

    <div class="flower flower1"></div>
    <div class="flower flower2"></div>
    <div class="flower flower3"></div>
    <div class="flower flower4"></div>
    <div class="flower flower5"></div>
    <div class="flower flower6"></div>

    <div class="title">Match the rhyming words</div>

    <div class="game-area">

        <!-- LEFT COLUMN -->

        <div class="column">

            <div class="card" data-word="dog">
                <img src="assets/dog.png" alt="dog">
                <div class="label">dog</div>
            </div>

            <div class="card" data-word="cap">
                <img src="assets/cap.png" alt="cap">
                <div class="label">cap</div>
            </div>

            <div class="card" data-word="bat">
                <img src="assets/bat.png" alt="bat">
                <div class="label">bat</div>
            </div>

            <div class="card" data-word="fan">
                <img src="assets/fan.png" alt="fan">
                <div class="label">fan</div>
            </div>

            <div class="card" data-word="fox">
                <img src="assets/fox.png" alt="fox">
                <div class="label">fox</div>
            </div>

        </div>

        <!-- RIGHT COLUMN -->

        <div class="column">

            <div class="card" data-word="hat">
                <img src="assets/hat.png" alt="hat">
                <div class="label">hat</div>
            </div>

            <div class="card" data-word="pan">
                <img src="assets/pan.png" alt="pan">
                <div class="label">pan</div>
            </div>

            <div class="card" data-word="box">
                <img src="assets/box.png" alt="box">
                <div class="label">box</div>
            </div>

            <div class="card" data-word="log">
                <img src="assets/log.png" alt="log">
                <div class="label">log</div>
            </div>

            <div class="card" data-word="tap">
                <img src="assets/tap.png" alt="tap">
                <div class="label">tap</div>
            </div>

        </div>

    </div>

    <div class="tick" id="tick">✔</div>

</div>

<!-- ================= SLIDE 3 ================= -->

<div id="slide3" class="screen">
    <div class="goodjob">Good Job!</div>
</div>

<!-- ================= AUDIO ================= -->

<audio id="correctSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=correct-2-46134.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound">
    <source src="assets/wrong.mp3" type="audio/mpeg">
</audio>

<!-- ================= SCRIPT ================= -->

<script>

    /* ---------- Slide Transition ---------- */

    setTimeout(() => {
        document.getElementById("slide1").classList.remove("active");
        document.getElementById("slide2").classList.add("active");
    }, 3000);

    /* ---------- Matching Logic ---------- */

    const pairs = {
        dog: "log",
        cap: "tap",
        bat: "hat",
        fan: "pan",
        fox: "box"
    };

    let selectedCard = null;
    let matchedCount = 0;

    const cards = document.querySelectorAll(".card");
    const tick = document.getElementById("tick");

    const correctSound = document.getElementById("correctSound");
    const wrongSound = document.getElementById("wrongSound");

    cards.forEach(card => {

        card.addEventListener("click", () => {

            if(card.classList.contains("correct")) return;

            if(!selectedCard){

                selectedCard = card;
                card.classList.add("selected");
                return;
            }

            if(selectedCard === card){
                return;
            }

            const first = selectedCard.dataset.word;
            const second = card.dataset.word;

            if(pairs[first] === second){

                selectedCard.classList.remove("selected");

                selectedCard.classList.add("correct");
                card.classList.add("correct");

                tick.style.display = "block";

                correctSound.currentTime = 0;
                correctSound.play();

                setTimeout(() => {
                    tick.style.display = "none";
                }, 800);

                matchedCount++;

                if(matchedCount === 5){

                    setTimeout(() => {
                        showFinalSlide();
                    }, 1200);
                }

            } else {

                wrongSound.currentTime = 0;
                wrongSound.play();

                selectedCard.classList.remove("selected");
            }

            selectedCard = null;

        });

    });

    /* ---------- Final Slide ---------- */

    function showFinalSlide(){

        document.getElementById("slide2").classList.remove("active");
        document.getElementById("slide3").classList.add("active");

        createConfetti();
    }

    /* ---------- Confetti ---------- */

    function createConfetti(){

        const colors = [
            "#ff1493",
            "#ffd700",
            "#00c853",
            "#00b0ff",
            "#ff6d00",
            "#aa00ff"
        ];

        for(let i=0; i<120; i++){

            const confetti = document.createElement("div");

            confetti.classList.add("confetti");

            confetti.style.left = Math.random() * 100 + "vw";

            confetti.style.background = colors[Math.floor(Math.random()*colors.length)];

            confetti.style.animationDuration = (Math.random()*3 + 2) + "s";

            confetti.style.opacity = Math.random();

            confetti.style.transform = `rotate(${Math.random()*360}deg)`;

            document.getElementById("slide3").appendChild(confetti);
        }
    }

</script>

</body>
</html>
