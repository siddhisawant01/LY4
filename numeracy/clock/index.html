<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Clock Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#FDF6F9;
overflow:hidden;
}

.slide{
display:none;
width:100vw;
height:100vh;
padding:18px;
text-align:center;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

.logoSlide{
background:white;
}

.logo{
width:250px;
max-width:70%;
}

h2{
font-size:28px;
color:#444;
margin-bottom:20px;
}

.clockBorder{

padding:12px;
border-radius:25px;
background:linear-gradient(45deg,#ffb6c1,#ffd166,#90e0ef,#caffbf);
display:inline-block;
margin:20px;
}

.clockBorder img{
width:250px;
max-width:70vw;
}

.options{
display:flex;
gap:25px;
margin-top:25px;
}

.option{
background:white;
padding:18px 35px;
border-radius:15px;
font-size:30px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
transition:.2s;
}

.option:active{
transform:scale(.95);
}

.feedback{
position:absolute;
font-size:120px;
display:none;
animation:pop .4s ease;
}

@keyframes pop{

0%{
transform:scale(.2);
}

100%{
transform:scale(1);
}

}

.goodjob{
font-size:52px;
font-weight:bold;
color:#ff4d6d;
}

.confetti{
font-size:70px;
margin-top:20px;
animation:fall 1s infinite alternate;
}

@keyframes fall{

from{
transform:translateY(-10px);
}

to{
transform:translateY(10px);
}

}

.instruction{
font-size:28px;
font-weight:bold;
color:#444;
margin-bottom:10px;
}

@media(max-width:700px){

.instruction{
font-size:22px;
}

.clockBorder img{
width:180px;
}

.option{
font-size:24px;
padding:15px 25px;
}

.feedback{
font-size:90px;
}

.goodjob{
font-size:42px;
}

}

</style>
</head>

<body>

<audio id="correctAudio" src="assets/clap.mp3"></audio>
<audio id="wrongAudio" src="assets/wrong.mp3"></audio>

<!-- Slide 1 -->

<div class="slide active logoSlide">

<img src="assets/innovine_logo.png" class="logo">

</div>

<div id="game"></div>

<!-- Last Slide -->

<div class="slide" id="lastSlide">

<div class="goodjob">
🎉 Good Job! 🎉
</div>

<div class="confetti">
🎊🎉✨🎈🎊✨🎉
</div>

</div>

<script>

const questions=[

{
img:"clock_5.png",
correct:"5:00",
wrong:"3:00"
},

{
img:"clock_8.png",
correct:"8:00",
wrong:"1:00"
},

{
img:"clock_2.png",
correct:"2:00",
wrong:"7:00"
},

{
img:"clock_9.png",
correct:"9:00",
wrong:"6:00"
},

{
img:"clock_1.png",
correct:"1:00",
wrong:"3:00"
},

{
img:"clock_4.png",
correct:"4:00",
wrong:"6:00"
},

{
img:"clock_7.png",
correct:"7:00",
wrong:"2:00"
},

{
img:"clock_12.png",
correct:"12:00",
wrong:"6:00"
}

];

const game=document.getElementById("game");

questions.forEach((q,index)=>{

const slide=document.createElement("div");

slide.className="slide";

slide.innerHTML=`

<div class="instruction">
Read the clock and tap on the correct time.
</div>

<div class="clockBorder">

<img src="assets/${q.img}">

</div>

<div class="options">

<div class="option" onclick="checkAnswer(this,false)">
${q.wrong}
</div>

<div class="option" onclick="checkAnswer(this,true)">
${q.correct}
</div>

</div>

<div class="feedback"></div>

`;

game.appendChild(slide);

});

const slides=document.querySelectorAll(".slide");

let current=0;

setTimeout(()=>{

slides[current].classList.remove("active");

current++;

slides[current].classList.add("active");

},2000);

function checkAnswer(btn,correct){

const feedback=btn.parentElement.parentElement.querySelector(".feedback");

if(correct){

feedback.innerHTML="✅";

feedback.style.display="block";

document.getElementById("correctAudio").play();

setTimeout(()=>{

feedback.style.display="none";

slides[current].classList.remove("active");

current++;

if(current<slides.length){

slides[current].classList.add("active");

}

},1500);

}

else{

feedback.innerHTML="❌";

feedback.style.display="block";

document.getElementById("wrongAudio").play();

setTimeout(()=>{

feedback.style.display="none";

},1200);

}

}

</script>

</body>
</html>
