<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Addition Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  overflow:hidden;
}

/* COMMON SLIDE */
.slide{
  display:none;
  width:100vw;
  height:100vh;
  position:absolute;
  top:0;
  left:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* SHOW ACTIVE */
.active{
  display:flex;
}

/* BACKGROUND FOR SLIDES 2–8 */
.bg{
  background-image:url("assets/bg.png"); /* replace if needed */
  background-size:cover;
}

/* TITLE */
.title{
  font-size:42px;
  color:#ffcc00;
  font-weight:bold;
  text-shadow:2px 2px 0 #000;
  margin-top:10px;
}

/* EQUATION AREA */
.equation{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

/* IMAGE BOX */
.box{
  width:90px;
  height:90px;
  border:4px solid #ff66cc;
  border-radius:12px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* EMPTY ANSWER BOX */
.answerBox{
  width:90px;
  height:90px;
  border:4px dashed #333;
  border-radius:12px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
}

/* OPTIONS */
.options{
  display:flex;
  gap:15px;
  margin-top:25px;
}

.option{
  width:70px;
  height:70px;
  background:white;
  border:4px solid #4CAF50;
  border-radius:10px;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
}

.option:active{
  transform:scale(0.95);
}

/* FEEDBACK */
.tick{
  font-size:80px;
  color:green;
  display:none;
}

.cross{
  font-size:80px;
  color:red;
  display:none;
}

/* GOOD JOB SCREEN */
#goodjob{
  background:white;
  font-size:50px;
  font-weight:bold;
  color:green;
}

/* falling numbers */
.fall{
  position:absolute;
  top:-50px;
  font-size:30px;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide active" id="s1" style="background:white;">
  <img src="assets/innovine-logo.png" style="width:200px;">
</div>

<!-- SLIDE 2 -->
<div class="slide bg" id="s2">
  <div class="title">ADDITION</div>

  <div class="equation">
    <div class="box"><img src="assets/6carrots.png" width="70"></div>
    <div style="font-size:40px;">+</div>
    <div class="box"><img src="assets/4carrots.png" width="70"></div>
    <div style="font-size:40px;">=</div>
    <div class="answerBox" id="a2"></div>
  </div>

  <div class="options">
    <div class="option" onclick="check(this,10,'a2',2)">10</div>
    <div class="option" onclick="wrong(this)">6</div>
    <div class="option" onclick="wrong(this)">5</div>
  </div>

  <div class="tick">✔</div>
  <div class="cross">✖</div>
</div>

<!-- SLIDE 3 -->
<div class="slide bg" id="s3">
  <div class="title">ADDITION</div>

  <div class="equation">
    <div class="box"><img src="assets/2crayons.png" width="70"></div>
    <div style="font-size:40px;">+</div>
    <div class="box"><img src="assets/4crayons.png" width="70"></div>
    <div style="font-size:40px;">=</div>
    <div class="answerBox" id="a3"></div>
  </div>

  <div class="options">
    <div class="option" onclick="wrong(this)">8</div>
    <div class="option" onclick="check(this,6,'a3',3)">6</div>
    <div class="option" onclick="wrong(this)">5</div>
  </div>

  <div class="tick">✔</div>
  <div class="cross">✖</div>
</div>

<!-- SLIDE 4 -->
<div class="slide bg" id="s4">
  <div class="title">ADDITION</div>

  <div class="equation">
    <div class="box"><img src="assets/6pineapples.png" width="70"></div>
    <div style="font-size:40px;">+</div>
    <div class="box"><img src="assets/3pineapples.png" width="70"></div>
    <div style="font-size:40px;">=</div>
    <div class="answerBox" id="a4"></div>
  </div>

  <div class="options">
    <div class="option" onclick="wrong(this)">10</div>
    <div class="option" onclick="check(this,9,'a4',4)">9</div>
    <div class="option" onclick="wrong(this)">5</div>
  </div>

  <div class="tick">✔</div>
  <div class="cross">✖</div>
</div>

<!-- SLIDE 5 -->
<div class="slide bg" id="s5">
  <div class="title">ADDITION</div>

  <div class="equation">
    <div class="box"><img src="assets/2star.png" width="70"></div>
    <div style="font-size:40px;">+</div>
    <div class="box"><img src="assets/1star.png" width="70"></div>
    <div style="font-size:40px;">=</div>
    <div class="answerBox" id="a5"></div>
  </div>

  <div class="options">
    <div class="option" onclick="wrong(this)">6</div>
    <div class="option" onclick="wrong(this)">4</div>
    <div class="option" onclick="check(this,3,'a5',5)">3</div>
  </div>

  <div class="tick">✔</div>
  <div class="cross">✖</div>
</div>

<!-- SLIDE 6 -->
<div class="slide bg" id="s6">
  <div class="title">ADDITION</div>

  <div class="equation">
    <div class="box"><img src="assets/3balloons.png" width="70"></div>
    <div style="font-size:40px;">+</div>
    <div class="box"><img src="assets/2balloons.png" width="70"></div>
    <div style="font-size:40px;">=</div>
    <div class="answerBox" id="a6"></div>
  </div>

  <div class="options">
    <div class="option" onclick="wrong(this)">9</div>
    <div class="option" onclick="wrong(this)">7</div>
    <div class="option" onclick="check(this,5,'a6',6)">5</div>
  </div>

  <div class="tick">✔</div>
  <div class="cross">✖</div>
</div>

<!-- SLIDE 7 -->
<div class="slide bg" id="s7">
  <div class="title">ADDITION</div>

  <div class="equation">
    <div class="box"><img src="assets/4birds.png" width="70"></div>
    <div style="font-size:40px;">+</div>
    <div class="box"><img src="assets/3birds.png" width="70"></div>
    <div style="font-size:40px;">=</div>
    <div class="answerBox" id="a7"></div>
  </div>

  <div class="options">
    <div class="option" onclick="check(this,7,'a7',7)">7</div>
    <div class="option" onclick="wrong(this)">6</div>
    <div class="option" onclick="wrong(this)">5</div>
  </div>

  <div class="tick">✔</div>
  <div class="cross">✖</div>
</div>

<!-- SLIDE 8 -->
<div class="slide bg" id="s8">
  <div class="title">ADDITION</div>

  <div class="equation">
    <div class="box"><img src="assets/4candies.png" width="70"></div>
    <div style="font-size:40px;">+</div>
    <div class="box"><img src="assets/4candies2.png" width="70"></div>
    <div style="font-size:40px;">=</div>
    <div class="answerBox" id="a8"></div>
  </div>

  <div class="options">
    <div class="option" onclick="wrong(this)">4</div>
    <div class="option" onclick="check(this,8,'a8',8)">8</div>
    <div class="option" onclick="wrong(this)">2</div>
  </div>

  <div class="tick">✔</div>
  <div class="cross">✖</div>
</div>

<!-- SLIDE 9 -->
<div class="slide" id="goodjob">
  GOOD JOB!
</div>

<audio id="clap" src="assets/clap.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

let current=1;

function show(n){
  document.querySelectorAll(".slide").forEach(s=>s.classList.remove("active"));
  document.getElementById(n).classList.add("active");
}

function check(el,ans,box,next){
  let selected = el;
  selected.style.display="none";

  document.getElementById("clap").play();

  document.getElementById(box).innerHTML=ans;

  let slide=document.getElementById("s"+next);
  slide.querySelector(".tick").style.display="block";

  setTimeout(()=>{
    current++;
    if(current<=8){
      show("s"+current);
    }else{
      show("goodjob");
      rain();
    }
  },1000);
}

function wrong(el){
  document.getElementById("wrong").play();
  let slide=el.parentElement.parentElement;
  slide.querySelector(".cross").style.display="block";
  setTimeout(()=>{
    slide.querySelector(".cross").style.display="none";
  },800);
}

/* GOOD JOB RAIN */
function rain(){
  for(let i=0;i<30;i++){
    let d=document.createElement("div");
    d.className="fall";
    d.innerHTML=Math.floor(Math.random()*10);
    d.style.left=Math.random()*100+"vw";
    d.style.color=["red","blue","green","orange"][Math.floor(Math.random()*4)];
    document.body.appendChild(d);
  }
}

/* AUTO MOVE FROM SLIDE 1 */
setTimeout(()=>show("s2"),2000);

</script>

</body>
</html>
