<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Addition Game 1 to 10</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family: Arial, sans-serif;
}

body{
height:100vh;
width:100vw;
background: url("data:image/png;base64,REPLACE_BG") center/cover no-repeat;
}

/* SPLASH */
#splash{
position:absolute;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

#splash img{
width:200px;
}

/* GAME WRAPPER */
.screen{
display:none;
height:100vh;
width:100vw;
flex-direction:column;
align-items:center;
justify-content:flex-start;
text-align:center;
padding:10px;
box-sizing:border-box;
}

/* HEADER */
.title{
font-size:38px;
color:#ffcc00;
font-weight:bold;
text-shadow:2px 2px 0 #333;
margin-top:10px;
}

/* QUESTION ROW */
.row{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.box{
width:80px;
height:80px;
border:3px solid #fff;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:28px;
font-weight:bold;
}

.imgBox{
width:80px;
height:80px;
border:3px solid #fff;
border-radius:12px;
background:white;
display:flex;
align-items:center;
justify-content:center;
}

.imgBox img{
width:70px;
height:70px;
}

/* OPTIONS */
.options{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.option{
width:70px;
height:70px;
border:3px solid #333;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
background:#fff;
cursor:pointer;
}

/* FEEDBACK */
#feedback{
font-size:40px;
position:absolute;
top:40%;
display:none;
}

#end{
display:none;
font-size:40px;
color:green;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME SCREENS -->
<div id="game" class="screen"></div>

<!-- END -->
<div id="end">🎉 Good Job! 🎉</div>

<audio id="correctSound" src="assets/clap.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const slides = [
{
q1:"6carrots.png", q2:"4carrots.png", ans:10, options:[10,6,5]
},
{
q1:"2crayons.png", q2:"4crayons.png", ans:6, options:[8,6,5]
},
{
q1:"6pineapples.png", q2:"3pineapples.png", ans:9, options:[10,9,5]
},
{
q1:"2stars.png", q2:"1star.png", ans:3, options:[6,4,3]
},
{
q1:"3balloons.png", q2:"2balloons.png", ans:5, options:[9,7,5]
},
{
q1:"4birds.png", q2:"3birds.png", ans:7, options:[7,6,5]
},
{
q1:"4candies.png", q2:"4candies2.png", ans:8, options:[4,8,2]
}
];

let current = 0;

const game = document.getElementById("game");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

setTimeout(()=>{
document.getElementById("splash").style.display="none";
game.style.display="flex";
loadSlide();
},3000);

function loadSlide(){

if(current >= slides.length){
game.style.display="none";
document.getElementById("end").style.display="block";
return;
}

let s = slides[current];

game.innerHTML = `

<div class="title">ADDITION</div>

<div class="row">
  <div class="imgBox"><img src="assets/${s.q1}"></div>
  <div style="font-size:40px;">+</div>
  <div class="imgBox"><img src="assets/${s.q2}"></div>
  <div style="font-size:40px;">=</div>
  <div class="box" id="answerBox"></div>
</div>

<div class="options">
  ${s.options.map(o=>`
    <div class="option" onclick="checkAnswer(${o})">${o}</div>
  `).join("")}
</div>

<div id="feedback"></div>

`;

}

function checkAnswer(val){

let s = slides[current];
let feedback = document.getElementById("feedback");

if(val === s.ans){

correctSound.play();

feedback.innerHTML = "✔";
feedback.style.color="green";
feedback.style.display="block";

document.getElementById("answerBox").innerText = val;

setTimeout(()=>{
current++;
loadSlide();
},1000);

}else{

wrongSound.play();

feedback.innerHTML = "✖";
feedback.style.color="red";
feedback.style.display="block";

setTimeout(()=>{
feedback.style.display="none";
},700);

}

}

</script>

</body>
</html>
