<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LY4 Tap on Shapes</title>
<style>
body {
    margin:0;
    font-family:'Arbutus', cursive;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}
#splash, #game, #endScreen {
    width:100%;
    height:100vh;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}
#splash img { width:200px; height:auto; }

#game {
    background: url('assets/background_tile.png') center/cover no-repeat;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* Main box behind instructions and options */
#questionArea {
    position:relative;
    z-index:1;
    background: rgba(255,255,255,0.95);
    border: 10px solid #ff80ff; /* pink border */
    border-radius:25px;
    padding:30px;
    display:flex;
    flex-direction:column;
    align-items:center;
    max-width:750px;
    margin-top:40px;
}

#instructionBox {
    background:#f8d152;
    padding:12px 20px;
    border-radius:12px;
    margin-bottom:25px;
    text-align:center;
    font-size:1.3em;
}

#questionBox {
    width: 100%;
    display:flex;
    justify-content:space-around;
    gap:25px;
}

.optionWrapper {
    width:130px;
    height:130px;
    background: linear-gradient(145deg,#a16945,#f0d9b5);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    transition: transform 0.2s;
}
.optionWrapper.correct { border: 4px solid green; }
.optionWrapper.wrong { border: 4px solid red; }

.option {
    width:95px;
    height:95px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    cursor:pointer;
    background:white;
    border:2px solid #ccc;
    transition: transform 0.2s;
}
.option.correct { border-color:green; }
.option.wrong { border-color:red; animation:shake 0.3s; }

@keyframes shake {
    0% { transform: translateX(0px); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0px); }
}

#endScreen h1 { font-size:2em; margin:10px; color:#4b2e83; }
#playAgain { margin-top:20px; padding:12px 25px; font-size:1.3em; cursor:pointer; border:none; border-radius:10px; background:#ff99cc; color:white; }
canvas#confetti { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>

<div id="splash">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div id="questionArea">
    <div id="instructionBox">Tap the correct shape!</div>
    <div id="questionBox"></div>
  </div>
</div>

<div id="endScreen">
    <canvas id="confetti"></canvas>
    <h1>Good Job!</h1>
    <button id="playAgain">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const splash = document.getElementById('splash');
const game = document.getElementById('game');
const endScreen = document.getElementById('endScreen');
const questionBox = document.getElementById('questionBox');
const instructionBox = document.getElementById('instructionBox');
const playAgain = document.getElementById('playAgain');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');

const confettiCanvas = document.getElementById('confetti');
const confettiCtx = confettiCanvas.getContext('2d');
let confettiParticles = [];
function initConfetti() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
    confettiParticles = [];
    for(let i=0;i<150;i++){
        confettiParticles.push({x:Math.random()*confettiCanvas.width,y:Math.random()*confettiCanvas.height- confettiCanvas.height,r:Math.random()*6+4,d:Math.random()*150+50,color:`hsl(${Math.random()*360},70%,60%)`,tilt:Math.random()*10-10});
    }
}
function drawConfetti(){
    confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    confettiParticles.forEach(p=>{
        confettiCtx.beginPath();
        confettiCtx.moveTo(p.x+p.tilt+p.r/2,p.y);
        confettiCtx.lineTo(p.x+p.tilt,p.y+p.r);
        confettiCtx.lineTo(p.x+p.tilt-p.r/2,p.y);
        confettiCtx.closePath();
        confettiCtx.fillStyle = p.color;
        confettiCtx.fill();
    });
}
function updateConfetti(){
    confettiParticles.forEach(p=>{p.y+=Math.cos(0.01*p.d)+1+p.r/2;p.x+=Math.sin(0.01*p.d);if(p.y>confettiCanvas.height){p.y=-10;p.x=Math.random()*confettiCanvas.width;}});
    drawConfetti();
    requestAnimationFrame(updateConfetti);
}

// Questions array without the moon question
const questions = [
    {options:['circle','triangle','square'],answer:'circle'},
    {options:['star','rectangle','semicircle'],answer:'star'},
    {options:['circle','diamond','semicircle'],answer:'diamond'},
    {options:['oval','triangle','rectangle'],answer:'rectangle'},
    {options:['star','diamond','circle'],answer:'circle'},
    {options:['triangle','star','square'],answer:'triangle'},
    {options:['square','oval','star'],answer:'star'},
    {options:['triangle','circle','diamond'],answer:'circle'},
    {options:['semicircle','star','diamond'],answer:'semicircle'}
];

let currentQuestion=0, attempts=0;

function showQuestion(){
    questionBox.innerHTML=''; attempts=0;
    const q=questions[currentQuestion];
    instructionBox.innerHTML=`Tap the <strong>${q.answer}</strong>!`;
    q.options.forEach((opt)=>{
        const wrapper = document.createElement('div');
        wrapper.classList.add('optionWrapper');
        const div = document.createElement('div');
        div.classList.add('option');
        div.dataset.shape = opt;
        div.innerHTML = `<img src="assets/${opt}.png" alt="${opt}" style="width:95px;height:95px;">`;
        div.addEventListener('click', checkAnswer);
        wrapper.appendChild(div);
        questionBox.appendChild(wrapper);
    });
}

function checkAnswer(e){
    const selected = e.currentTarget.dataset.shape;
    const correct = questions[currentQuestion].answer;
    if(selected===correct){
        e.currentTarget.classList.add('correct');
        correctSound.play(); clapSound.play();
        setTimeout(()=>{
            currentQuestion++;
            if(currentQuestion<questions.length) showQuestion(); else endGame();
        },1000);
    } else {
        e.currentTarget.classList.add('wrong'); wrongSound.play(); attempts++;
        if(attempts>=2){
            Array.from(document.querySelectorAll('.option')).forEach(opt=>{
                if(opt.dataset.shape===correct) opt.classList.add('correct');
            });
        }
    }
}

function endGame(){ game.style.display='none'; endScreen.style.display='flex'; initConfetti(); updateConfetti(); }

playAgain.addEventListener('click',()=>{
    currentQuestion=0; endScreen.style.display='none'; game.style.display='flex'; showQuestion();
});

function startGame(){ splash.style.display='flex'; setTimeout(()=>{ splash.style.display='none'; game.style.display='flex'; showQuestion(); },2000); }
startGame();
</script>
</body>
</html>
