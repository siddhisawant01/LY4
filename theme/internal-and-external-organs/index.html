<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Parts Sorting Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* SLIDES */
.slide {
  display: none;
  width: 100vw;
  height: 100vh;
}

.active {
  display: flex;
}

/* SLIDE 1 */
#slide1 {
  background: white;
  justify-content: center;
  align-items: center;
}

#slide1 img {
  width: 140px;
}

/* SLIDE 2 */
#slide2 {
  flex-direction: column;
  background: linear-gradient(to bottom, #f7d9e3, #fdf1f5);
}

/* INSTRUCTION */
.instruction {
  text-align: center;
  font-size: 16px;
  padding: 5px;
  font-weight: bold;
}

/* TOP SECTION */
.top {
  display: flex;
  height: 45%;
}

.column {
  flex: 1;
  border: 2px dashed #555;
  margin: 8px;
  border-radius: 12px;
  text-align: center;
  padding: 5px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.column h3 {
  grid-column: span 3;
  margin: 5px 0;
}

/* BOTTOM ITEMS */
.bottom {
  height: 55%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  border-top: 2px solid #ccc;
  padding: 5px;
}

/* ITEMS */
.item {
  width: 60px;
  height: 60px;
  margin: 5px;
  border-radius: 10px;
  background: white;
  border: 2px solid #ffb6c1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.item img {
  width: 80%;
  height: 80%;
  object-fit: contain;
}

/* SLIDE 3 */
#slide3 {
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: white;
  position: relative;
}

#message {
  font-size: 28px;
  margin-bottom: 20px;
}

/* CONFETTI */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
  <img src="assets/innovine-logo.png">
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

  <div class="instruction">
    Sort the internal organs and external body parts
  </div>

  <div class="top">
    <div class="column" id="internal">
      <h3>Internal Organs</h3>
    </div>
    <div class="column" id="external">
      <h3>External Body Parts</h3>
    </div>
  </div>

  <div class="bottom" id="items"></div>

</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
  <div id="message">🎉 Good Job 🎉</div>
</div>

<script>

/* SLIDE TRANSITION */
setTimeout(() => {
  slide1.classList.remove("active");
  slide2.classList.add("active");
}, 2000);

/* DATA (NO HAIR) */
const items = [
  {name: "heart", type: "internal"},
  {name: "brain", type: "internal"},
  {name: "lungs", type: "internal"},
  {name: "kidney", type: "internal"},
  {name: "stomach", type: "internal"},
  {name: "eyes", type: "external"},
  {name: "nose", type: "external"},
  {name: "ear", type: "external"},
  {name: "hand", type: "external"},
  {name: "leg", type: "external"}
];

/* SHUFFLE FUNCTION */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
shuffle(items);

let correctCount = 0;
const container = document.getElementById("items");

/* CREATE ITEMS */
items.forEach(item => {
  const div = document.createElement("div");
  div.className = "item";
  div.draggable = true;
  div.dataset.type = item.type;

  const img = document.createElement("img");
  img.src = `assets/${item.name}.png`;

  div.appendChild(img);
  container.appendChild(div);

  div.addEventListener("dragstart", () => draggedItem = div);
  div.addEventListener("touchstart", () => touchItem = div);
});

/* DRAG + TOUCH */
let draggedItem = null;
let touchItem = null;

/* DROP ZONES */
["internal", "external"].forEach(id => {
  const zone = document.getElementById(id);

  zone.addEventListener("dragover", e => e.preventDefault());

  zone.addEventListener("drop", () => handleDrop(zone, draggedItem));

  zone.addEventListener("touchend", () => handleDrop(zone, touchItem));
});

/* HANDLE DROP */
function handleDrop(zone, item) {
  if (!item) return;

  if (item.dataset.type === zone.id) {
    zone.appendChild(item);
    correctSound.play();
    correctCount++;

    if (correctCount === items.length) finishGame();
  } else {
    wrongSound.play();
  }

  draggedItem = null;
  touchItem = null;
}

/* FINISH GAME */
function finishGame() {
  setTimeout(() => {
    slide2.classList.remove("active");
    slide3.classList.add("active");
    clapSound.play();
    createConfetti();
  }, 500);
}

/* CONFETTI */
function createConfetti() {
  for (let i = 0; i < 40; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (2 + Math.random()*2) + "s";
    document.getElementById("slide3").appendChild(c);
  }
}

</script>

</body>
</html>
