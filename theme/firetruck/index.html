<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Build The Fire Truck</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#fff7e8;
  touch-action:none;
  user-select:none;
}

.screen{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.screen.active{
  display:flex;
}

/* SLIDE 1 */
#logoScreen{
  background:white;
}

.logo{
  width:min(42vw,220px);
  height:auto;
}

/* GAME SCREEN */
#gameScreen{
  background:linear-gradient(180deg,#fff8df 0%,#ffe7b5 100%);
  flex-direction:column;
  padding:8px;
}

.instruction{
  font-size:clamp(18px,4vw,30px);
  font-weight:900;
  color:#b91c1c;
  text-align:center;
  margin:2px 0 5px;
  line-height:1.15;
  text-shadow:1px 1px 0 white;
}

.reference-img{
  width:min(64vw,390px);
  max-height:18vh;
  object-fit:contain;
  margin-bottom:4px;
  border:3px solid #ffffff;
  border-radius:12px;
  background:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* Puzzle board */
.board-wrap{
  background:white;
  border:4px solid #111827;
  border-radius:12px;
  padding:4px;
  box-shadow:0 5px 14px rgba(0,0,0,0.22);
  margin-bottom:6px;
}

.puzzle-board{
  width:min(90vw,570px);
  height:min(42vh,370px);
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:0;
  background:#f9fafb;
  border:2px dashed #9ca3af;
  border-radius:6px;
  overflow:hidden;
}

.slot{
  border:1px dashed #d1d5db;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffff;
  position:relative;
}

.slot.filled{
  border:none;
  background:white;
}

.slot img{
  width:100%;
  height:100%;
  object-fit:fill;
  display:block;
}

/* Pieces tray */
.tray{
  width:min(96vw,650px);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  padding:5px;
  background:rgba(255,255,255,0.75);
  border:3px solid #f97316;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.piece{
  width:clamp(45px,14vw,82px);
  height:clamp(58px,17vw,96px);
  object-fit:cover;
  background:white;
  border:3px solid #2563eb;
  border-radius:10px;
  cursor:grab;
  box-shadow:0 4px 8px rgba(0,0,0,0.25);
  transition:transform 0.15s, border 0.15s;
}

.piece.selected{
  border:4px solid #16a34a;
  transform:scale(1.08);
  box-shadow:0 0 18px #22c55e;
}

.piece.hidden{
  visibility:hidden;
  pointer-events:none;
}

/* Feedback */
.feedback{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  z-index:50;
  font-size:min(24vw,130px);
  font-weight:900;
  pointer-events:none;
}

.feedback.show{
  animation:pop 0.65s ease forwards;
}

.tick{
  color:#16a34a;
  text-shadow:0 0 15px white;
}

.cross{
  color:#dc2626;
  text-shadow:0 0 15px white;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  30%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}
  75%{transform:translate(-50%,-50%) scale(1);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(0);opacity:0;}
}

.wiggle{
  animation:wiggle 0.35s ease;
}

@keyframes wiggle{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-8px);}
  50%{transform:translateX(8px);}
  75%{transform:translateX(-5px);}
}

/* END SCREEN */
#endScreen{
  background:linear-gradient(180deg,#bdefff 0%,#fff9c4 100%);
  flex-direction:column;
  text-align:center;
  padding:10px;
}

.good-job{
  font-size:clamp(42px,10vw,82px);
  font-weight:900;
  color:#dc2626;
  text-shadow:3px 3px 0 #fff, 6px 6px 0 #fbbf24;
  margin-bottom:20px;
  animation:bounce 1s infinite alternate;
}

@keyframes bounce{
  from{transform:translateY(0);}
  to{transform:translateY(-12px);}
}

.road{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:24vh;
  background:#4b5563;
  border-top:8px solid #374151;
  overflow:hidden;
}

.road::after{
  content:"";
  position:absolute;
  top:48%;
  left:0;
  width:200%;
  height:8px;
  background:repeating-linear-gradient(
    90deg,
    #ffffff 0 55px,
    transparent 55px 105px
  );
  animation:roadMove 1.2s linear infinite;
}

@keyframes roadMove{
  from{transform:translateX(0);}
  to{transform:translateX(-105px);}
}

/* CSS Fire Truck Animation */
.firetruck-runner{
  position:absolute;
  bottom:13vh;
  right:-45vw;
  width:min(65vw,430px);
  height:min(32vw,210px);
  animation:drive 5.5s linear forwards;
}

@keyframes drive{
  from{right:-50vw;}
  to{right:110vw;}
}

.truck-body{
  position:absolute;
  bottom:28px;
  left:10%;
  width:78%;
  height:48%;
  background:#e11d1d;
  border:5px solid #7f1d1d;
  border-radius:14px 20px 8px 8px;
  box-shadow:inset 0 -12px 0 rgba(0,0,0,0.12);
}

.truck-cab{
  position:absolute;
  bottom:28px;
  left:0;
  width:38%;
  height:68%;
  background:#ef2222;
  border:5px solid #7f1d1d;
  border-radius:45px 12px 8px 8px;
}

.window{
  position:absolute;
  top:14%;
  background:#8ee7ff;
  border:4px solid #0f172a;
  border-radius:10px;
}

.window.one{
  left:18%;
  width:28%;
  height:35%;
}

.window.two{
  left:50%;
  width:28%;
  height:35%;
}

.light{
  position:absolute;
  left:4%;
  bottom:38%;
  width:11%;
  height:16%;
  background:#facc15;
  border:3px solid #7f1d1d;
  border-radius:4px;
}

.bumper{
  position:absolute;
  bottom:20px;
  left:-4%;
  width:22%;
  height:18%;
  background:#cbd5e1;
  border:4px solid #475569;
  border-radius:8px;
}

.stripe{
  position:absolute;
  bottom:46%;
  left:0;
  width:100%;
  height:12%;
  background:white;
}

.ladder{
  position:absolute;
  top:5%;
  left:25%;
  width:68%;
  height:14%;
  background:repeating-linear-gradient(
    90deg,
    #d1d5db 0 12px,
    #6b7280 12px 16px
  );
  border:4px solid #4b5563;
  transform:rotate(-5deg);
  border-radius:5px;
}

.siren{
  position:absolute;
  top:-16px;
  left:22%;
  width:12%;
  height:15%;
  background:red;
  border:4px solid #7f1d1d;
  border-radius:50% 50% 6px 6px;
  animation:sirenFlash 0.3s infinite alternate;
}

@keyframes sirenFlash{
  from{box-shadow:0 0 8px red;}
  to{box-shadow:0 0 28px red;}
}

.wheel{
  position:absolute;
  bottom:0;
  width:19%;
  aspect-ratio:1/1;
  background:#111827;
  border:7px solid #020617;
  border-radius:50%;
  animation:wheelSpin 0.5s linear infinite;
}

.wheel::after{
  content:"";
  position:absolute;
  inset:22%;
  background:#d1d5db;
  border-radius:50%;
  border:4px dotted #374151;
}

.wheel.front{
  left:17%;
}

.wheel.back{
  right:14%;
}

@keyframes wheelSpin{
  from{transform:rotate(0deg);}
  to{transform:rotate(-360deg);}
}

.play-again{
  position:absolute;
  bottom:28vh;
  padding:12px 26px;
  font-size:clamp(18px,4vw,26px);
  font-weight:900;
  border:none;
  border-radius:30px;
  background:#16a34a;
  color:white;
  box-shadow:0 5px 0 #166534;
  cursor:pointer;
}

.play-again:active{
  transform:translateY(4px);
  box-shadow:0 1px 0 #166534;
}

@media(max-height:620px){
  .instruction{
    font-size:18px;
    margin-bottom:2px;
  }

  .reference-img{
    max-height:15vh;
  }

  .puzzle-board{
    height:39vh;
  }

  .tray{
    gap:4px;
    padding:4px;
  }

  .piece{
    width:44px;
    height:58px;
  }
}
</style>
</head>

<body>

<!-- Slide 1: Logo -->
<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo">
</div>

<!-- Slide 2: Game -->
<div id="gameScreen" class="screen">
  <div class="instruction">
    Help build the fire truck! Move each puzzle piece to the correct spot and complete the picture.
  </div>

  <img src="assets/firetruck.png" class="reference-img" alt="Fire Truck Reference">

  <div class="board-wrap">
    <div class="puzzle-board" id="puzzleBoard">
      <div class="slot" data-correct="1"></div>
      <div class="slot" data-correct="2"></div>
      <div class="slot" data-correct="3"></div>
      <div class="slot" data-correct="4"></div>
      <div class="slot" data-correct="5"></div>
      <div class="slot" data-correct="6"></div>
    </div>
  </div>

  <div class="tray" id="tray">
    <img class="piece" src="assets/6.png" draggable="true" data-piece="6" alt="Puzzle piece 6">
    <img class="piece" src="assets/2.png" draggable="true" data-piece="2" alt="Puzzle piece 2">
    <img class="piece" src="assets/4.png" draggable="true" data-piece="4" alt="Puzzle piece 4">
    <img class="piece" src="assets/5.png" draggable="true" data-piece="5" alt="Puzzle piece 5">
    <img class="piece" src="assets/3.png" draggable="true" data-piece="3" alt="Puzzle piece 3">
    <img class="piece" src="assets/1.png" draggable="true" data-piece="1" alt="Puzzle piece 1">
  </div>
</div>

<!-- Slide 3: End -->
<div id="endScreen" class="screen">
  <div class="good-job">Good job!</div>

  <div class="firetruck-runner">
    <div class="ladder"></div>
    <div class="truck-body">
      <div class="stripe"></div>
    </div>
    <div class="truck-cab">
      <div class="window one"></div>
      <div class="window two"></div>
      <div class="light"></div>
      <div class="bumper"></div>
      <div class="siren"></div>
    </div>
    <div class="wheel front"></div>
    <div class="wheel back"></div>
  </div>

  <button class="play-again" onclick="restartGame()">Play Again</button>
  <div class="road"></div>
</div>

<div id="tick" class="feedback tick">✓</div>
<div id="cross" class="feedback cross">✗</div>

<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/clap.mp3" preload="auto"></audio>

<script>
const logoScreen = document.getElementById("logoScreen");
const gameScreen = document.getElementById("gameScreen");
const endScreen = document.getElementById("endScreen");

const tick = document.getElementById("tick");
const cross = document.getElementById("cross");

const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

const slots = document.querySelectorAll(".slot");
const pieces = document.querySelectorAll(".piece");

let selectedPiece = null;
let draggedPiece = null;
let placedCount = 0;
let sirenInterval = null;

/* Slide 1 visible for 3 seconds */
setTimeout(() => {
  logoScreen.classList.remove("active");
  gameScreen.classList.add("active");
}, 3000);

/* Unlock audio on first touch/click */
document.body.addEventListener("pointerdown", () => {
  wrongSound.load();
  clapSound.load();
}, {once:true});

function showFeedback(type){
  const icon = type === "tick" ? tick : cross;
  icon.classList.remove("show");
  void icon.offsetWidth;
  icon.classList.add("show");
}

function playWrong(){
  try{
    wrongSound.currentTime = 0;
    wrongSound.play();
  }catch(e){}
}

function playClap(){
  try{
    clapSound.currentTime = 0;
    clapSound.play();
  }catch(e){}
}

/* Browser-generated fire truck siren */
function startFireTruckSound(){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();

    sirenInterval = setInterval(() => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(550, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(950, ctx.currentTime + 0.35);
      osc.frequency.linearRampToValueAtTime(550, ctx.currentTime + 0.7);

      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.05);
      gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 0.75);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.8);
    }, 820);

    setTimeout(() => {
      clearInterval(sirenInterval);
      sirenInterval = null;
    }, 5200);

  }catch(e){}
}

function placePiece(piece, slot){
  if(!piece || !slot || slot.classList.contains("filled")) return;

  const pieceNo = piece.dataset.piece;
  const correctNo = slot.dataset.correct;

  if(pieceNo === correctNo){
    const placedImg = document.createElement("img");
    placedImg.src = piece.src;
    placedImg.alt = "Placed puzzle piece";

    slot.innerHTML = "";
    slot.appendChild(placedImg);
    slot.classList.add("filled");

    piece.classList.add("hidden");
    piece.classList.remove("selected");
    selectedPiece = null;

    showFeedback("tick");
    placedCount++;

    if(placedCount === 6){
      setTimeout(() => {
        playClap();
        gameScreen.classList.remove("active");
        endScreen.classList.add("active");
        startFireTruckSound();
      }, 800);
    }
  }else{
    showFeedback("cross");
    playWrong();

    slot.classList.add("wiggle");
    setTimeout(() => slot.classList.remove("wiggle"), 350);

    piece.classList.add("wiggle");
    setTimeout(() => piece.classList.remove("wiggle"), 350);
  }
}

/* Tap-to-select for preschool learners */
pieces.forEach(piece => {
  piece.addEventListener("click", () => {
    if(piece.classList.contains("hidden")) return;

    pieces.forEach(p => p.classList.remove("selected"));
    piece.classList.add("selected");
    selectedPiece = piece;
  });

  piece.addEventListener("dragstart", e => {
    draggedPiece = piece;
    e.dataTransfer.setData("text/plain", piece.dataset.piece);
  });

  piece.addEventListener("dragend", () => {
    draggedPiece = null;
  });
});

/* Tap slot or drop piece */
slots.forEach(slot => {
  slot.addEventListener("click", () => {
    if(selectedPiece){
      placePiece(selectedPiece, slot);
    }
  });

  slot.addEventListener("dragover", e => {
    e.preventDefault();
  });

  slot.addEventListener("drop", e => {
    e.preventDefault();
    if(draggedPiece){
      placePiece(draggedPiece, slot);
    }
  });
});

/* Touch drag support for mobile */
pieces.forEach(piece => {
  piece.addEventListener("touchstart", e => {
    if(piece.classList.contains("hidden")) return;
    selectedPiece = piece;
    pieces.forEach(p => p.classList.remove("selected"));
    piece.classList.add("selected");
  }, {passive:true});
});

function restartGame(){
  clearInterval(sirenInterval);

  placedCount = 0;
  selectedPiece = null;
  draggedPiece = null;

  slots.forEach(slot => {
    slot.innerHTML = "";
    slot.classList.remove("filled");
  });

  pieces.forEach(piece => {
    piece.classList.remove("hidden","selected","wiggle");
  });

  endScreen.classList.remove("active");
  gameScreen.classList.add("active");
}
</script>

</body>
</html>
