<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Zone Matching Challenge</title>

<style>
/* =========================
   GLOBAL STYLES
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Comic Sans MS', sans-serif;
}

body {
  overflow: hidden;
}

/* =========================
   SLIDE 1 (LOGO)
========================= */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#intro img {
  max-width: 200px;
}

/* =========================
   MAIN GAME LAYOUT
========================= */
#game {
  display: none;
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* LEFT PANEL */
#leftPanel {
  position: absolute;
  left: 0;
  top: 0;
  width: 25%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
  z-index: 2;
}

/* ANIMAL BUBBLE */
.animal {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: grab;
  position: relative;
  transition: transform 0.5s ease;
}

.label {
  position: absolute;
  bottom: -18px;
  font-size: 10px;
  text-transform: lowercase;
}

/* ZONES */
.zone {
  position: absolute;
  left: 25%;
  width: 75%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* SUNLIGHT */
#sunlight {
  top: 0;
  height: 33%;
  background: #A0E0FF;
}

/* TWILIGHT */
#twilight {
  top: 33%;
  height: 33%;
  background: #2060A0;
}

/* MIDNIGHT */
#midnight {
  top: 66%;
  height: 34%;
  background: #0A1020;
  overflow: hidden;
}

/* GLOWING DOTS */
.dot {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #6cf;
  border-radius: 50%;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* ZONE TITLE */
.zone h2 {
  color: white;
  font-size: 18px;
  margin-bottom: 5px;
}

/* DROP AREA */
.dropzone {
  width: 80%;
  height: 50%;
  border: 2px dashed white;
  border-radius: 10px;
  position: relative;
}

/* CONFETTI */
.star {
  position: absolute;
  color: yellow;
  font-size: 12px;
  animation: pop 1s ease forwards;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1.5); opacity: 0; }
}

/* MASCOT */
#mascot {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 40px;
}

#speech {
  position: absolute;
  bottom: 60px;
  right: 60px;
  background: white;
  padding: 8px;
  border-radius: 10px;
  font-size: 12px;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  .animal {
    width: 50px;
    height: 50px;
    font-size: 24px;
  }
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro">
  <img src="assets/logo.png" alt="logo">
</div>

<!-- GAME -->
<div id="game">

  <!-- LEFT PANEL -->
  <div id="leftPanel"></div>

  <!-- ZONES -->
  <div id="sunlight" class="zone">
    <h2>SUNLIGHT ZONE</h2>
    <div class="dropzone" data-zone="sunlight"></div>
  </div>

  <div id="twilight" class="zone">
    <h2>TWILIGHT ZONE</h2>
    <div class="dropzone" data-zone="twilight"></div>
  </div>

  <div id="midnight" class="zone">
    <h2>MIDNIGHT ZONE</h2>
    <div class="dropzone" data-zone="midnight"></div>
  </div>

  <!-- MASCOT -->
  <div id="speech">Drag us home!</div>
  <div id="mascot">🤖</div>

</div>

<script>
/* =========================
   INTRO TIMER
========================= */
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("game").style.display = "block";
}, 2000);

/* =========================
   DATA
========================= */
const animals = [
  {emoji:"🦈", name:"shark", zone:"sunlight"},
  {emoji:"🦭", name:"seal", zone:"sunlight"},
  {emoji:"🦑", name:"squid", zone:"twilight"},
  {emoji:"🦞", name:"lobster", zone:"twilight"},
  {emoji:"🐟", name:"anglerfish", zone:"midnight"},
  {emoji:"🐍", name:"hagfish", zone:"midnight"},
  {emoji:"🪼", name:"jellyfish", zone:"midnight"}
];

/* =========================
   CREATE ANIMALS
========================= */
const leftPanel = document.getElementById("leftPanel");

animals.forEach((a, index) => {
  let div = document.createElement("div");
  div.className = "animal";
  div.innerHTML = a.emoji + `<div class="label">${a.name}</div>`;
  div.dataset.zone = a.zone;
  div.dataset.index = index;

  makeDraggable(div);
  leftPanel.appendChild(div);
});

/* =========================
   DRAG + TOUCH SUPPORT
========================= */
function makeDraggable(el) {
  let offsetX, offsetY;

  el.addEventListener("pointerdown", e => {
    offsetX = e.offsetX;
    offsetY = e.offsetY;
    el.setPointerCapture(e.pointerId);

    el.style.position = "absolute";
    el.style.zIndex = 1000;
  });

  el.addEventListener("pointermove", e => {
    if (el.hasPointerCapture(e.pointerId)) {
      el.style.left = e.clientX - offsetX + "px";
      el.style.top = e.clientY - offsetY + "px";
    }
  });

  el.addEventListener("pointerup", e => {
    el.releasePointerCapture(e.pointerId);
    checkDrop(el);
  });
}

/* =========================
   CHECK DROP
========================= */
function checkDrop(el) {
  const zones = document.querySelectorAll(".dropzone");
  let placed = false;

  zones.forEach(zone => {
    const rect = zone.getBoundingClientRect();
    const elRect = el.getBoundingClientRect();

    if (
      elRect.left < rect.right &&
      elRect.right > rect.left &&
      elRect.top < rect.bottom &&
      elRect.bottom > rect.top
    ) {
      if (zone.dataset.zone === el.dataset.zone) {
        correctDrop(el, zone);
      } else {
        wrongDrop(el);
      }
      placed = true;
    }
  });

  if (!placed) wrongDrop(el);
}

/* =========================
   CORRECT DROP
========================= */
function correctDrop(el, zone) {
  playSound(true);

  // snap into zone
  el.style.left = "auto";
  el.style.top = "auto";
  el.style.position = "relative";
  zone.appendChild(el);

  // confetti
  for (let i = 0; i < 5; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.innerHTML = "⭐";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    zone.appendChild(star);
    setTimeout(() => star.remove(), 1000);
  }
}

/* =========================
   WRONG DROP
========================= */
function wrongDrop(el) {
  playSound(false);
  el.style.transition = "all 0.5s";
  el.style.left = "";
  el.style.top = "";
  el.style.position = "relative";
}

/* =========================
   SOUND (NO FILES)
========================= */
function playSound(correct) {
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  let gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  if (correct) {
    osc.frequency.value = 600;
  } else {
    osc.frequency.value = 200;
  }

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
}

/* =========================
   MIDNIGHT GLOW DOTS
========================= */
for (let i = 0; i < 30; i++) {
  let dot = document.createElement("div");
  dot.className = "dot";
  dot.style.left = Math.random()*100 + "%";
  dot.style.top = Math.random()*100 + "%";
  document.getElementById("midnight").appendChild(dot);
}
</script>

</body>
</html>
