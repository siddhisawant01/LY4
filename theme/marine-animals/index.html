<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Zones Game</title>

<style>
body{
  margin:0;
  font-family:Comic Sans MS;
  overflow:hidden;
}

/* SLIDES */
.slide{
  width:100vw;
  height:100vh;
  position:absolute;
  display:none;
}
.active{display:flex;}

/* SLIDE 1 */
#slide1{
  background:white;
  justify-content:center;
  align-items:center;
}
#slide1 img{width:250px;}

/* SLIDE 2 */
#slide2{
  background:url("assets/slide 2 background.png") no-repeat center/cover;
  flex-direction:column;
}

/* INSTRUCTION */
#title{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:white;
  margin:10px;
  text-shadow:2px 2px 5px black;
}

/* LAYOUT */
.container{
  display:flex;
  height:90%;
}

/* LEFT PANEL */
#left{
  width:28%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}

/* BUBBLE */
.animal{
  width:90px;
  height:90px;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  backdrop-filter: blur(4px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  animation:float 2s infinite;
  box-shadow:0 0 10px rgba(255,255,255,0.6);
}

.animal img{
  width:65px;
  height:65px;
  object-fit:contain;
}

.label{
  font-size:11px;
}

/* FLOAT */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* RIGHT PANEL */
#right{
  width:72%;
  position:relative;
}

/* OCEAN IMAGE (NO BLUR NOW) */
#ocean{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* ZONES */
.zone{
  position:absolute;
  width:60%;
  height:20%;
  border:2px dashed white;
  border-radius:10px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  padding:5px;
  gap:8px;
}

/* POSITION */
#sun{top:12%; left:20%;}
#twi{top:40%; left:20%;}
#mid{top:68%; left:20%;}

/* FIXED SIZE INSIDE ZONE */
.zone img{
  width:60px;
  height:60px;
}

/* SLIDE 3 */
#slide3{
  background:linear-gradient(#4facfe,#00f2fe);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-size:40px;
}

/* BUBBLES FINAL */
.bubble{
  position:absolute;
  width:10px;height:10px;
  background:white;
  border-radius:50%;
  animation:rise 5s infinite;
}
@keyframes rise{
  from{transform:translateY(100px);}
  to{transform:translateY(-100px);}
}

</style>
</head>

<body>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
  <img src="assets/innovine_logo.png">
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<div id="title">
Match the marine animal to the correct ocean zone
</div>

<div class="container">

<div id="left"></div>

<div id="right">

<img id="ocean" src="assets/ocean_zone.png">

<div id="sun" class="zone" data-zone="sunlight"></div>
<div id="twi" class="zone" data-zone="twilight"></div>
<div id="mid" class="zone" data-zone="midnight"></div>

</div>
</div>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
  🎉 Great Job! 🐠
</div>

<script>

/* SLIDE SWITCH */
setTimeout(()=>{
slide1.classList.remove("active");
slide2.classList.add("active");
},2000);

/* AUDIO */
const correct=new Audio("assets/clapping music.mp3");
const wrong=new Audio("assets/wrong music.mp3");

/* DATA */
const animals=[
["anglerfish.png","midnight","anglerfish"],
["clownfish.png","sunlight","clownfish"],
["dolphin.png","sunlight","dolphin"],
["eel.png","midnight","eel"],
["jellyfish.png","twilight","jellyfish"],
["octopus.png","twilight","octopus"],
["sea turtle.png","sunlight","seaturtle"],
["shrimp.png","twilight","shrimp"],
["squid.png","twilight","squid"],
["starfish.png","sunlight","starfish"]
];

const left=document.getElementById("left");

/* CREATE */
animals.forEach(a=>{
let d=document.createElement("div");
d.className="animal";
d.innerHTML=`
<img src="assets/${a[0]}">
<div class="label">${a[2]}</div>
`;
d.dataset.zone=a[1];
drag(d);
left.appendChild(d);
});

/* DRAG */
function drag(el){
let ox,oy;

el.onpointerdown=e=>{
ox=e.offsetX;oy=e.offsetY;
el.setPointerCapture(e.pointerId);
el.style.position="absolute";
}

el.onpointermove=e=>{
if(el.hasPointerCapture(e.pointerId)){
el.style.left=e.clientX-ox+"px";
el.style.top=e.clientY-oy+"px";
}
}

el.onpointerup=e=>{
el.releasePointerCapture(e.pointerId);
drop(el);
}
}

/* DROP */
function drop(el){
document.querySelectorAll(".zone").forEach(z=>{
let r=z.getBoundingClientRect();
let e=el.getBoundingClientRect();

if(e.left<r.right && e.right>r.left && e.top<r.bottom && e.bottom>r.top){

if(z.dataset.zone===el.dataset.zone){

correct.play();

/* SNAP INSIDE GRID */
el.style.position="relative";
el.style.left="";
el.style.top="";
el.style.transition="all 0.4s";

z.appendChild(el);

checkFinish();

}else{
wrong.play();
reset(el);
}
}
});
}

/* RESET */
function reset(el){
el.style.position="relative";
el.style.left="";
el.style.top="";
}

/* FINISH */
function checkFinish(){
if(document.querySelectorAll("#left .animal").length===0){

setTimeout(()=>{
slide2.classList.remove("active");
slide3.classList.add("active");

/* bubbles */
for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="bubble";
b.style.left=Math.random()*100+"%";
b.style.top=Math.random()*100+"%";
slide3.appendChild(b);
}

},800);
}
}

</script>

</body>
</html>
