<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Zones Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Comic Sans MS';
}
body{overflow:hidden;}

/* SLIDES */
.slide{
  width:100vw;
  height:100vh;
  position:absolute;
  display:none;
}
.active{display:flex;}

/* SLIDE 1 */
#slide1{
  background:white;
  align-items:center;
  justify-content:center;
}
#slide1 img{width:220px;}

/* SLIDE 2 */
#slide2{
  background:url("assets/slide 2 background.png") no-repeat center/cover;
  flex-direction:column;
}

/* INSTRUCTION */
#instruction{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:white;
  margin-top:10px;
  text-shadow:2px 2px 4px black;
}

/* LAYOUT */
#container{
  display:flex;
  height:90%;
}

/* LEFT PANEL */
#left{
  width:25%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* ANIMAL BUBBLES */
.animal{
  width:65px;
  height:65px;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  animation:bounce 2s infinite;
  position:relative;
}
.animal img{
  width:45px;
  height:45px;
}
.label{
  font-size:10px;
}

/* BOUNCE */
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* RIGHT PANEL */
#right{
  width:75%;
  position:relative;
}

/* OCEAN IMAGE */
#ocean{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
}

/* DROP ZONES */
.zone{
  position:absolute;
  width:60%;
  height:18%;
  border:2px dashed white;
  border-radius:10px;
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:5px;
}

/* POSITION */
#sun{top:15%; left:20%;}
#twi{top:40%; left:20%;}
#mid{top:65%; left:20%;}

/* SLIDE 3 */
#slide3{
  background:linear-gradient(#4facfe,#00f2fe);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  font-size:40px;
}

/* BUBBLES */
.bubble{
  position:absolute;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  animation:float 6s infinite;
}
@keyframes float{
  from{transform:translateY(100px);}
  to{transform:translateY(-100px);}
}

</style>
</head>

<body>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
  <img src="assets/innovine_logo.png">
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<div id="instruction">
Match the marine animal to the correct ocean zone
</div>

<div id="container">

<!-- LEFT -->
<div id="left"></div>

<!-- RIGHT -->
<div id="right">

<img id="ocean" src="assets/ocean_zone.png">

<div id="sun" class="zone" data-zone="sunlight"></div>
<div id="twi" class="zone" data-zone="twilight"></div>
<div id="mid" class="zone" data-zone="midnight"></div>

</div>
</div>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
  <div>🌊 Great Job! 🐠</div>
</div>

<script>

/* SLIDE SWITCH */
setTimeout(()=>{
slide1.classList.remove("active");
slide2.classList.add("active");
},2000);

/* AUDIO */
const correct=new Audio("assets/clapping music.mp3");
const wrong=new Audio("assets/wrong music.mp3");

/* DATA */
const animals=[
["anglerfish.png","midnight","anglerfish"],
["clownfish.png","sunlight","clownfish"],
["dolphin.png","sunlight","dolphin"],
["eel.png","midnight","eel"],
["jellyfish.png","twilight","jellyfish"],
["octopus.png","twilight","octopus"],
["sea turtle.png","sunlight","seaturtle"],
["shrimp.png","twilight","shrimp"],
["squid.png","twilight","squid"],
["starfish.png","sunlight","starfish"]
];

const left=document.getElementById("left");

/* CREATE */
animals.forEach(a=>{
let d=document.createElement("div");
d.className="animal";
d.innerHTML=`
<img src="assets/${a[0]}">
<div class="label">${a[2]}</div>
`;
d.dataset.zone=a[1];
drag(d);
left.appendChild(d);
});

/* DRAG + SWIM */
function drag(el){
let ox,oy;

el.onpointerdown=e=>{
ox=e.offsetX;oy=e.offsetY;
el.setPointerCapture(e.pointerId);
el.style.position="absolute";
}

el.onpointermove=e=>{
if(el.hasPointerCapture(e.pointerId)){
el.style.left=e.clientX-ox+"px";
el.style.top=e.clientY-oy+"px";
}
}

el.onpointerup=e=>{
el.releasePointerCapture(e.pointerId);
drop(el);
}
}

/* DROP */
function drop(el){
document.querySelectorAll(".zone").forEach(z=>{
let r=z.getBoundingClientRect();
let e=el.getBoundingClientRect();

if(e.left<r.right&&e.right>r.left&&e.top<r.bottom&&e.bottom>r.top){

if(z.dataset.zone===el.dataset.zone){

correct.play();

/* SWIM EFFECT */
el.style.transition="all 0.6s ease";
z.appendChild(el);
el.style.position="relative";

checkComplete();

}else{
wrong.play();
reset(el);
}
}
});
}

function reset(el){
el.style.position="relative";
el.style.left="";
el.style.top="";
}

/* COMPLETE */
function checkComplete(){
if(document.querySelectorAll("#left .animal").length===0){
setTimeout(()=>{
slide2.classList.remove("active");
slide3.classList.add("active");

/* bubbles */
for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="bubble";
b.style.left=Math.random()*100+"%";
b.style.top=Math.random()*100+"%";
slide3.appendChild(b);
}

},1000);
}
}

</script>

</body>
</html>
