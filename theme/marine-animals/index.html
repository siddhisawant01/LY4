<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  overflow:hidden;
  font-family: Comic Sans MS;
}

/* SLIDES */
.slide{
  width:100vw;
  height:100vh;
  position:absolute;
  display:none;
}
.active{display:flex;}

/* SLIDE 1 */
#slide1{
  background:white;
  justify-content:center;
  align-items:center;
}
#slide1 img{width:200px;}

/* SLIDE 2 */
#slide2{
  background:url('assets/bg3.jpg') no-repeat center/cover;
}

/* LAYOUT */
.container{
  display:flex;
  width:100%;
  height:100%;
}

/* LEFT */
#left{
  width:25%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* RIGHT */
#right{
  width:75%;
  position:relative;
}

/* OCEAN IMAGE */
#ocean{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
}

/* DROP ZONES */
.zone{
  position:absolute;
  width:60%;
  height:18%;
  border:2px dashed white;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
  padding:5px;
}

#sun{top:15%; left:20%;}
#twi{top:40%; left:20%;}
#mid{top:65%; left:20%;}

/* ANIMALS */
.animal{
  width:60px;height:60px;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  animation:bounce 2s infinite;
}
.animal img{width:40px;}

@keyframes bounce{
  50%{transform:translateY(-5px);}
}

/* SLIDE 3 */
#slide3{
  background:url('assets/bg2.jpg') no-repeat center/cover;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:40px;
}

</style>
</head>

<body>

<div id="slide1" class="slide active">
<img src="assets/innovine_logo.png">
</div>

<div id="slide2" class="slide">
<div class="container">

<div id="left"></div>

<div id="right">
<img id="ocean" src="assets/ocean_zones.png">

<div id="sun" class="zone" data-zone="sunlight"></div>
<div id="twi" class="zone" data-zone="twilight"></div>
<div id="mid" class="zone" data-zone="midnight"></div>

</div>

</div>
</div>

<div id="slide3" class="slide">
🎉 GOOD JOB 🎉
</div>

<script>

setTimeout(()=>{
slide1.classList.remove("active");
slide2.classList.add("active");
},2000);

/* DATA */
const animals=[
["anglerfish.png","midnight"],
["clownfish.png","sunlight"],
["dolphin.png","sunlight"],
["eel.png","midnight"],
["jellyfish.png","twilight"],
["octopus.png","twilight"],
["sea turtle.png","sunlight"],
["shrimp.png","twilight"],
["squid.png","twilight"],
["starfish.png","sunlight"]
];

const left=document.getElementById("left");

animals.forEach(a=>{
let d=document.createElement("div");
d.className="animal";
d.innerHTML=`<img src="assets/${a[0]}">`;
d.dataset.zone=a[1];
drag(d);
left.appendChild(d);
});

/* DRAG */
function drag(el){
let ox,oy;

el.onpointerdown=e=>{
ox=e.offsetX;oy=e.offsetY;
el.setPointerCapture(e.pointerId);
el.style.position="absolute";
}

el.onpointermove=e=>{
if(el.hasPointerCapture(e.pointerId)){
el.style.left=e.clientX-ox+"px";
el.style.top=e.clientY-oy+"px";
}
}

el.onpointerup=e=>{
el.releasePointerCapture(e.pointerId);
drop(el);
}
}

/* DROP */
function drop(el){
document.querySelectorAll(".zone").forEach(z=>{
let r=z.getBoundingClientRect();
let e=el.getBoundingClientRect();

if(e.left<r.right&&e.right>r.left&&e.top<r.bottom&&e.bottom>r.top){

if(z.dataset.zone===el.dataset.zone){
z.appendChild(el);
el.style.position="relative";

if(left.children.length===0){
setTimeout(()=>{
slide2.classList.remove("active");
slide3.classList.add("active");
},1000);
}

}else{
reset(el);
}
}
});
}

function reset(el){
el.style.position="relative";
el.style.left="";
el.style.top="";
}

</script>

</body>
</html>
