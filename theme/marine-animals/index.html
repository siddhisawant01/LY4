<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marine Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* ---------- SLIDES ---------- */
.slide {
  width: 100vw;
  height: 100vh;
  display: none;
}

.active {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ---------- SLIDE 1 ---------- */
#slide1 {
  background: white;
}

#logo {
  width: 200px;
}

/* ---------- SLIDE 2 ---------- */
#slide2 {
  background: url('assets/bg1.png') no-repeat center center;
  background-size: cover;
  flex-direction: column;
}

/* TOP BAR */
.header {
  background: #ffd6e7;
  padding: 10px 20px;
  border-radius: 20px;
  font-weight: bold;
  margin: 10px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}

/* GAME AREA */
.game {
  display: flex;
  width: 100%;
  height: 90%;
  justify-content: space-around;
  align-items: center;
}

/* ANIMAL COLUMN */
.column {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ANIMAL CARD */
.card {
  width: 90px;
  height: 100px;
  background: white;
  border-radius: 15px;
  border: 3px solid pink;
  text-align: center;
  padding: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.card img {
  width: 60px;
  height: 60px;
}

.card:hover {
  transform: scale(1.05);
}

/* CENTER ZONE IMAGE */
.zone-container {
  position: relative;
}

.zone-container img {
  width: 220px;
}

/* POSITIONED ZONES */
.zone {
  position: absolute;
  width: 100%;
  height: 33%;
  left: 0;
}

/* zone click areas */
#sun { top: 0; }
#twilight { top: 33%; }
#midnight { top: 66%; }

/* ---------- SLIDE 3 ---------- */
#slide3 {
  background: url('assets/bg1.png') no-repeat center center;
  background-size: cover;
  flex-direction: column;
  color: white;
  font-size: 40px;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 768px) {
  .card {
    width: 70px;
    height: 80px;
  }
  .card img {
    width: 50px;
    height: 50px;
  }
  .zone-container img {
    width: 160px;
  }
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
  <img id="logo" src="assets/innovine_logo.png"
       onerror="this.src='assets/innovine_logo.jpg'">
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

  <div class="header">
    🐠 Match the marine animals to the correct Ocean Zone 🌊
  </div>

  <div class="game">

    <!-- LEFT -->
    <div class="column">
      <div class="card" data-animal="dolphin"><img src="assets/dolphin.png"><br>Dolphin</div>
      <div class="card" data-animal="squid"><img src="assets/squid.png"><br>Squid</div>
      <div class="card" data-animal="octopus"><img src="assets/octopus.png"><br>Octopus</div>
      <div class="card" data-animal="anglerfish"><img src="assets/anglerfish.png"><br>Anglerfish</div>
      <div class="card" data-animal="starfish"><img src="assets/starfish.png"><br>Starfish</div>
    </div>

    <!-- CENTER -->
    <div class="zone-container">
      <img src="assets/ocean_zones.png">

      <div id="sun" class="zone" data-zone="sun"></div>
      <div id="twilight" class="zone" data-zone="twilight"></div>
      <div id="midnight" class="zone" data-zone="midnight"></div>
    </div>

    <!-- RIGHT -->
    <div class="column">
      <div class="card" data-animal="clownfish"><img src="assets/clownfish.png"><br>Clownfish</div>
      <div class="card" data-animal="jellyfish"><img src="assets/jellyfish.png"><br>Jellyfish</div>
      <div class="card" data-animal="sea_turtle"><img src="assets/sea_turtle.png"><br>Sea Turtle</div>
      <div class="card" data-animal="shrimp"><img src="assets/shrimp.png"><br>Shrimp</div>
      <div class="card" data-animal="eel"><img src="assets/eel.png"><br>Eel</div>
    </div>

  </div>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
  🎉 Great Job! 🎉
</div>

<!-- AUDIO -->
<audio id="correct" src="assets/clapping_music.mp3"></audio>
<audio id="wrong" src="assets/wrong_music.mp3"></audio>

<script>
setTimeout(() => {
  document.getElementById("slide1").classList.remove("active");
  document.getElementById("slide2").classList.add("active");
}, 2000);

let selected = null;
let score = 0;

const answers = {
  dolphin: "sun",
  squid: "twilight",
  octopus: "twilight",
  anglerfish: "midnight",
  starfish: "sun",
  clownfish: "sun",
  jellyfish: "twilight",
  sea_turtle: "sun",
  shrimp: "twilight",
  eel: "midnight"
};

document.querySelectorAll(".card").forEach(card => {
  card.onclick = () => {
    selected = card;
  };
});

document.querySelectorAll(".zone").forEach(zone => {
  zone.onclick = () => {
    if (!selected) return;

    let animal = selected.dataset.animal;
    let correctZone = answers[animal];

    if (zone.dataset.zone === correctZone) {
      document.getElementById("correct").play();
      zone.appendChild(selected);
      selected.style.position = "absolute";
      selected.style.top = "10px";
      score++;

      if (score === 10) {
        setTimeout(() => {
          document.getElementById("slide2").classList.remove("active");
          document.getElementById("slide3").classList.add("active");
        }, 800);
      }

    } else {
      document.getElementById("wrong").play();
    }

    selected = null;
  };
});
</script>

</body>
</html>
