<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean Game</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
}

/* -------- SLIDE CONTROL -------- */
#slide1 { display: block; }
#slide2 { display: none; }

/* -------- SLIDE 1 -------- */
#slide1 {
    height: 100vh;
    background: linear-gradient(to bottom, #74c0fc, #a5d8ff);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.logo {
    width: 180px;
    margin-bottom: 20px;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 20px;
    border: none;
    background: #ff6b6b;
    color: white;
    cursor: pointer;
}

/* -------- SLIDE 2 -------- */
#slide2 {
    height: 100vh;
    background: url("assets/bg1.png") no-repeat center;
    background-size: cover;
    display: flex;
    flex-direction: column;
}

/* title */
.title {
    text-align: center;
    background: #ffd6e0;
    padding: 10px;
    border-radius: 20px;
    margin: 10px auto;
    font-size: 18px;
}

/* layout */
.game {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    flex: 1;
}

/* columns */
.column {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* animal cards */
.card {
    width: 100px;
    background: white;
    padding: 8px;
    border-radius: 15px;
    border: 2px solid pink;
    text-align: center;
    cursor: grab;
}

.card img {
    width: 80px;
}

/* CENTER ZONE */
.zone-container {
    display: flex;
    justify-content: center;
    align-items: center;
}

.zone-image {
    width: 320px;
    height: 520px;
    position: relative;
}

.zone-image img {
    width: 100%;
    height: 100%;
    border-radius: 20px;
}

/* DROP ZONES */
.zone {
    position: absolute;
    width: 100%;
    height: 33%;
}

.sunlight { top: 0; }
.twilight { top: 33%; }
.midnight { top: 66%; }

/* feedback */
.correct {
    border: 3px solid green !important;
}
.wrong {
    border: 3px solid red !important;
}
</style>

</head>

<body>

<!-- -------- SLIDE 1 -------- -->
<div id="slide1">
    <!-- LOGO FIX -->
    <img src="assets/innovine.png" class="logo"
         onerror="this.style.display='none'">

    <button id="startBtn">Start Game</button>
</div>

<!-- -------- SLIDE 2 -------- -->
<div id="slide2">

    <div class="title">
        🌊 match the marine animals to the correct ocean zone 🌊
    </div>

    <div class="game">

        <!-- LEFT -->
        <div class="column">
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/dolphin.png"><div>dolphin</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/squid.png"><div>squid</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/octopus.png"><div>octopus</div>
            </div>
            <div class="card" draggable="true" data-zone="midnight">
                <img src="assets/anglerfish.png"><div>anglerfish</div>
            </div>
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/starfish.png"><div>starfish</div>
            </div>
        </div>

        <!-- CENTER -->
        <div class="zone-container">
            <div class="zone-image">

                <!-- BIG OCEAN IMAGE -->
                <img src="assets/ocean.png">

                <!-- DROP AREAS -->
                <div class="zone sunlight"></div>
                <div class="zone twilight"></div>
                <div class="zone midnight"></div>

            </div>
        </div>

        <!-- RIGHT -->
        <div class="column">
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/clownfish.png"><div>clownfish</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/jellyfish.png"><div>jellyfish</div>
            </div>
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/seaturtle.png"><div>sea turtle</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/shrimp.png"><div>shrimp</div>
            </div>
            <div class="card" draggable="true" data-zone="midnight">
                <img src="assets/eel.png"><div>eel</div>
            </div>
        </div>

    </div>
</div>

<script>

/* -------- START BUTTON FIX -------- */
document.getElementById("startBtn").onclick = function () {
    document.getElementById("slide1").style.display = "none";
    document.getElementById("slide2").style.display = "flex";
};

/* -------- DRAG DROP FIX -------- */
let dragged;

document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("dragstart", () => {
        dragged = card;
    });
});

document.querySelectorAll(".zone").forEach(zone => {

    zone.addEventListener("dragover", e => e.preventDefault());

    zone.addEventListener("drop", function () {

        const correct = dragged.getAttribute("data-zone");

        if (this.classList.contains(correct)) {
            this.appendChild(dragged);
            dragged.classList.add("correct");
        } else {
            dragged.classList.add("wrong");
            setTimeout(() => dragged.classList.remove("wrong"), 800);
        }

    });

});

</script>

</body>
</html>
