<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Zones Game</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
}

/* SLIDES */
.slide {
  width: 100vw;
  height: 100vh;
  display: none;
  position: relative;
}

.active {
  display: flex;
}

/* ---------- SLIDE 1 ---------- */
#slide1 {
  background: white;
  justify-content: center;
  align-items: center;
}

#logo {
  width: 200px;
}

/* ---------- SLIDE 2 ---------- */
#slide2 {
  background: url('assets/background.jpg') no-repeat center/cover;
  flex-direction: column;
}

/* Instruction */
#instruction {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: black;
  margin: 10px;
}

/* Layout */
.game-container {
  display: flex;
  height: 100%;
}

/* LEFT SIDE ANIMALS */
.left-panel {
  width: 35%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.bubble {
  width: 80px;
  height: 80px;
  margin: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  animation: bounce 2s infinite;
}

.bubble img {
  width: 50px;
  height: 50px;
}

.label {
  font-size: 12px;
}

/* RIGHT SIDE ZONES */
.right-panel {
  width: 65%;
  position: relative;
}

#zones {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Click zones */
.zone {
  position: absolute;
  width: 100%;
  height: 33%;
}

#sunlight { top: 0; }
#twilight { top: 33%; }
#midnight { top: 66%; }

/* ---------- SLIDE 3 ---------- */
#slide3 {
  background: linear-gradient(#00bcd4, #001f3f);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#message {
  font-size: 40px;
  color: white;
  font-weight: bold;
}

.fish {
  position: absolute;
  width: 60px;
  animation: swim 6s linear infinite;
}

/* ANIMATIONS */
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes swim {
  from { left: -100px; }
  to { left: 110%; }
}

/* MOBILE */
@media (max-width: 768px) {
  #instruction { font-size: 16px; }
  .bubble { width: 60px; height: 60px; }
  .bubble img { width: 40px; height: 40px; }
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
  <img id="logo" src="assets/innovine.png">
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">
  <div id="instruction">
    Match the marine animal to the correct ocean zone
  </div>

  <div class="game-container">

    <!-- LEFT -->
    <div class="left-panel" id="animals"></div>

    <!-- RIGHT -->
    <div class="right-panel">
      <img id="zones" src="assets/ocean_zones.png">

      <div id="sunlight" class="zone" onclick="selectZone('sunlight')"></div>
      <div id="twilight" class="zone" onclick="selectZone('twilight')"></div>
      <div id="midnight" class="zone" onclick="selectZone('midnight')"></div>
    </div>

  </div>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
  <div id="message">Great Job!</div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/clap.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* DATA */
const animals = [
  {name:"anglerfish", img:"anglerfish.png", zone:"midnight"},
  {name:"dolphin", img:"dolphin.png", zone:"sunlight"},
  {name:"eel", img:"eel.png", zone:"midnight"},
  {name:"jellyfish", img:"jellyfish.png", zone:"twilight"},
  {name:"seaturtle", img:"seaturtle.png", zone:"sunlight"},
  {name:"shrimp", img:"shrimp.png", zone:"twilight"},
  {name:"squid", img:"squid.png", zone:"twilight"},
  {name:"starfish", img:"starfish.png", zone:"sunlight"}
];

let selectedAnimal = null;
let matchedCount = 0;

/* CREATE ANIMALS */
const container = document.getElementById("animals");

animals.forEach(a => {
  let div = document.createElement("div");
  div.className = "bubble";
  div.innerHTML = `
    <img src="assets/${a.img}">
    <div class="label">${a.name}</div>
  `;
  div.onclick = () => selectAnimal(div, a);
  container.appendChild(div);
});

/* SELECT ANIMAL */
function selectAnimal(div, animal) {
  selectedAnimal = {div, animal};
}

/* SELECT ZONE */
function selectZone(zone) {
  if (!selectedAnimal) return;

  if (selectedAnimal.animal.zone === zone) {
    document.getElementById("correctSound").play();

    // swim animation
    selectedAnimal.div.style.position = "absolute";
    selectedAnimal.div.style.left = "40%";
    selectedAnimal.div.style.top = "50%";

    setTimeout(() => {
      selectedAnimal.div.style.display = "none";
    }, 1000);

    matchedCount++;

    if (matchedCount === animals.length) {
      setTimeout(showSlide3, 1500);
    }

  } else {
    document.getElementById("wrongSound").play();
  }

  selectedAnimal = null;
}

/* SHOW FINAL SLIDE */
function showSlide3() {
  document.getElementById("slide2").classList.remove("active");
  document.getElementById("slide3").classList.add("active");

  // add swimming fish
  for (let i=0; i<5; i++) {
    let fish = document.createElement("img");
    fish.src = "assets/dolphin.png";
    fish.className = "fish";
    fish.style.top = Math.random()*80 + "%";
    document.getElementById("slide3").appendChild(fish);
  }
}

/* AUTO SLIDE CHANGE */
setTimeout(() => {
  document.getElementById("slide1").classList.remove("active");
  document.getElementById("slide2").classList.add("active");
}, 2000);

</script>

</body>
</html>
