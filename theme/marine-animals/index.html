<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Zone Game</title>

<style>
body {
  margin: 0;
  font-family: 'Comic Sans MS', cursive;
}

/* ----------- SLIDES ----------- */
.slide {
  display: none;
  height: 100vh;
  width: 100%;
}

.active {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* ----------- SLIDE 1 ----------- */
#slide1 {
  background: linear-gradient(to bottom, #8fd3f4, #84fab0);
}

.logo {
  width: 200px;
  margin-bottom: 20px;
}

.start-btn {
  padding: 15px 30px;
  font-size: 22px;
  border: none;
  border-radius: 20px;
  background: #ff9a9e;
  cursor: pointer;
}

/* ----------- SLIDE 2 ----------- */
#slide2 {
  background: url('assets/bg-ocean.png') no-repeat center/cover;
}

/* Title */
.title {
  margin-top: 10px;
  background: #ffd6e0;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 18px;
}

/* Layout */
.game-container {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  width: 100%;
  height: 100%;
  align-items: center;
}

/* Animal cards */
.animal {
  width: 90px;
  padding: 8px;
  margin: 10px auto;
  background: white;
  border: 2px solid pink;
  border-radius: 15px;
  text-align: center;
  cursor: grab;
}

.animal img {
  width: 70px;
}

/* Ocean Zone */
.zone-container {
  display: flex;
  justify-content: center;
  align-items: center;
}

.zone {
  width: 300px;
  height: 500px;
  background: url('assets/ocean-zones.png') no-repeat center/contain;
  position: relative;
  border-radius: 20px;
}

/* Drop areas */
.drop {
  position: absolute;
  width: 100%;
  height: 33%;
}

.sunlight { top: 0; }
.twilight { top: 33%; }
.midnight { top: 66%; }

/* Drop feedback */
.correct {
  border: 3px solid green;
}

.wrong {
  border: 3px solid red;
}

</style>
</head>

<body>

<!-- ----------- SLIDE 1 ----------- -->
<div id="slide1" class="slide active">
  <img src="assets/innovine-logo.png" class="logo" alt="Logo">
  <button class="start-btn" onclick="startGame()">Start Game</button>
</div>

<!-- ----------- SLIDE 2 ----------- -->
<div id="slide2" class="slide">

<div class="title">🐠 Match the marine animals to the correct Ocean Zone 🌊</div>

<div class="game-container">

<!-- LEFT -->
<div>
  <div class="animal" draggable="true" data-zone="sunlight"><img src="assets/dolphin.png"><div>Dolphin</div></div>
  <div class="animal" draggable="true" data-zone="twilight"><img src="assets/squid.png"><div>Squid</div></div>
  <div class="animal" draggable="true" data-zone="twilight"><img src="assets/octopus.png"><div>Octopus</div></div>
  <div class="animal" draggable="true" data-zone="midnight"><img src="assets/anglerfish.png"><div>Anglerfish</div></div>
  <div class="animal" draggable="true" data-zone="sunlight"><img src="assets/starfish.png"><div>Starfish</div></div>
</div>

<!-- CENTER -->
<div class="zone-container">
  <div class="zone">
    <div class="drop sunlight"></div>
    <div class="drop twilight"></div>
    <div class="drop midnight"></div>
  </div>
</div>

<!-- RIGHT -->
<div>
  <div class="animal" draggable="true" data-zone="sunlight"><img src="assets/clownfish.png"><div>Clownfish</div></div>
  <div class="animal" draggable="true" data-zone="twilight"><img src="assets/jellyfish.png"><div>Jellyfish</div></div>
  <div class="animal" draggable="true" data-zone="sunlight"><img src="assets/seaturtle.png"><div>Sea Turtle</div></div>
  <div class="animal" draggable="true" data-zone="midnight"><img src="assets/shrimp.png"><div>Shrimp</div></div>
  <div class="animal" draggable="true" data-zone="midnight"><img src="assets/eel.png"><div>Eel</div></div>
</div>

</div>
</div>

<script>
function startGame() {
  document.getElementById("slide1").classList.remove("active");
  document.getElementById("slide2").classList.add("active");
}

let dragged;

document.querySelectorAll('.animal').forEach(item => {
  item.addEventListener('dragstart', () => {
    dragged = item;
  });
});

document.querySelectorAll('.drop').forEach(zone => {

  zone.addEventListener('dragover', e => e.preventDefault());

  zone.addEventListener('drop', () => {

    if (dragged.dataset.zone === zone.classList[1]) {
      zone.appendChild(dragged);
      dragged.classList.add("correct");
    } else {
      dragged.classList.add("wrong");
      setTimeout(() => dragged.classList.remove("wrong"), 500);
    }

  });

});
</script>

</body>
</html>
