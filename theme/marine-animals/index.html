<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marine Game</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
}

/* -------- SLIDES -------- */
.slide {
    display: none;
    height: 100vh;
}
.active {
    display: block;
}

/* -------- SLIDE 1 -------- */
#slide1 {
    background: linear-gradient(to bottom, #74c0fc, #a5d8ff);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.logo {
    width: 180px;
    margin-bottom: 20px;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 20px;
    border: none;
    background: #ff8787;
    color: white;
    cursor: pointer;
}

/* -------- SLIDE 2 -------- */
#slide2 {
    background: url("assets/bg1.png") no-repeat center;
    background-size: cover;
    display: flex;
    flex-direction: column;
}

/* title */
.title {
    text-align: center;
    background: #ffd6e0;
    padding: 10px;
    border-radius: 20px;
    margin: 10px auto;
    width: fit-content;
}

/* layout */
.game {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    height: 100%;
}

/* animals */
.column {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.card {
    width: 100px;
    padding: 10px;
    text-align: center;
    background: white;
    border-radius: 15px;
    border: 2px solid pink;
    cursor: grab;
}

.card img {
    width: 80px;
}

/* center zone image */
.zone-container {
    display: flex;
    justify-content: center;
    align-items: center;
}

.zone-image {
    width: 300px;   /* BIG SIZE FIXED */
    height: 500px;
    position: relative;
}

/* drop zones */
.zone {
    position: absolute;
    width: 100%;
    height: 33%;
}

.sunlight { top: 0; }
.twilight { top: 33%; }
.midnight { top: 66%; }

/* feedback */
.correct {
    border: 3px solid green !important;
}
.wrong {
    border: 3px solid red !important;
}
</style>
</head>

<body>

<!-- -------- SLIDE 1 -------- -->
<div id="slide1" class="slide active">
    <!-- FIXED LOGO -->
    <img src="assets/innovine.png" class="logo" onerror="this.style.display='none'">
    
    <button onclick="startGame()">Start Game</button>
</div>

<!-- -------- SLIDE 2 -------- -->
<div id="slide2" class="slide">

    <div class="title">🌊 match the marine animals to the correct ocean zone 🌊</div>

    <div class="game">

        <!-- LEFT -->
        <div class="column">
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/dolphin.png"><div>dolphin</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/squid.png"><div>squid</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/octopus.png"><div>octopus</div>
            </div>
            <div class="card" draggable="true" data-zone="midnight">
                <img src="assets/anglerfish.png"><div>anglerfish</div>
            </div>
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/starfish.png"><div>starfish</div>
            </div>
        </div>

        <!-- CENTER (IMPORTANT FIX) -->
        <div class="zone-container">
            <div class="zone-image">
                <!-- OCEAN IMAGE BACK -->
                <img src="assets/ocean.png" style="width:100%; height:100%; border-radius:20px;">

                <!-- DROP ZONES -->
                <div class="zone sunlight"></div>
                <div class="zone twilight"></div>
                <div class="zone midnight"></div>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="column">
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/clownfish.png"><div>clownfish</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/jellyfish.png"><div>jellyfish</div>
            </div>
            <div class="card" draggable="true" data-zone="sunlight">
                <img src="assets/seaturtle.png"><div>sea turtle</div>
            </div>
            <div class="card" draggable="true" data-zone="twilight">
                <img src="assets/shrimp.png"><div>shrimp</div>
            </div>
            <div class="card" draggable="true" data-zone="midnight">
                <img src="assets/eel.png"><div>eel</div>
            </div>
        </div>

    </div>
</div>

<script>
function startGame() {
    document.getElementById("slide1").classList.remove("active");
    document.getElementById("slide2").classList.add("active");
}

/* DRAG LOGIC (FIXED) */
let dragged;

document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("dragstart", () => {
        dragged = card;
    });
});

document.querySelectorAll(".zone").forEach(zone => {

    zone.addEventListener("dragover", e => e.preventDefault());

    zone.addEventListener("drop", function() {
        const correctZone = dragged.getAttribute("data-zone");

        if (this.classList.contains(correctZone)) {
            this.appendChild(dragged);
            dragged.classList.add("correct");
        } else {
            dragged.classList.add("wrong");
            setTimeout(() => dragged.classList.remove("wrong"), 1000);
        }
    });
});
</script>

</body>
</html>
