<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Zone Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Comic Sans MS';}
body{overflow:hidden;}

/* SLIDES */
.slide{
  width:100vw;height:100vh;
  position:absolute;
  display:none;
}
.active{display:flex;}

/* SLIDE 1 */
#slide1{
  background:white;
  align-items:center;
  justify-content:center;
}
#slide1 img{width:200px;}

/* SLIDE 2 MAIN BACKGROUND */
#slide2{
  background:url("assets/Backgroud 3(5).jpg") no-repeat center/cover;
}

/* SPLIT LAYOUT */
#container{
  display:flex;
  width:100%;
  height:100%;
}

/* LEFT PANEL */
#leftPanel{
  width:25%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}

/* RIGHT PANEL (THIS WAS MISSING BEFORE) */
#rightPanel{
  width:75%;
  height:100%;
  position:relative;
}

/* OCEAN ZONE IMAGE */
#oceanBG{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;   /* IMPORTANT */
}

/* ZONE DROP AREAS */
.dropzone{
  position:absolute;
  width:60%;
  height:18%;
  border:2px dashed white;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
  padding:5px;
}

/* POSITION MATCHING YOUR IMAGE */
#sun{ top:15%; left:20%; }
#twi{ top:40%; left:20%; }
#mid{ top:65%; left:20%; }

/* ANIMAL BUBBLES */
.animal{
  width:65px;height:65px;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  animation:bounce 2s infinite;
  cursor:pointer;
}

.animal img{width:45px;height:45px;}
.label{font-size:10px;}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* SLIDE 3 */
#slide3{
  background:url("assets/Backgroud 2(5).jpg") no-repeat center/cover;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:40px;
}

/* FLOATING BUBBLES */
.bubble{
  position:absolute;
  width:10px;height:10px;
  background:white;
  border-radius:50%;
  animation:float 6s infinite;
}
@keyframes float{
  from{transform:translateY(100px);}
  to{transform:translateY(-100px);}
}

</style>
</head>

<body>

<!-- SLIDE 1 -->
<div id="slide1" class="slide active">
  <img src="assets/innovine_logo.png">
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="slide">

<div id="container">

  <!-- LEFT -->
  <div id="leftPanel"></div>

  <!-- RIGHT -->
  <div id="rightPanel">

    <!-- THIS IS YOUR OCEAN IMAGE -->
    <img id="oceanBG" src="assets/ocean_zones.png">

    <!-- DROP ZONES -->
    <div id="sun" class="dropzone" data-zone="sunlight"></div>
    <div id="twi" class="dropzone" data-zone="twilight"></div>
    <div id="mid" class="dropzone" data-zone="midnight"></div>

  </div>

</div>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="slide">
  <h1>🎉 GOOD JOB! 🎉</h1>
</div>

<script>

/* SLIDE SWITCH */
setTimeout(()=>{
slide1.classList.remove("active");
slide2.classList.add("active");
},2000);

/* AUDIO */
const correctSound=new Audio("assets/clapping music.mp3");
const wrongSound=new Audio("assets/wrong music.mp3");

/* DATA */
const animals=[
{img:"assets/anglerfish.png",zone:"midnight"},
{img:"assets/clownfish.png",zone:"sunlight"},
{img:"assets/dolphin.png",zone:"sunlight"},
{img:"assets/eel.png",zone:"midnight"},
{img:"assets/jellyfish.png",zone:"twilight"},
{img:"assets/octopus.png",zone:"twilight"},
{img:"assets/sea turtle.png",zone:"sunlight"},
{img:"assets/shrimp.png",zone:"twilight"},
{img:"assets/squid.png",zone:"twilight"},
{img:"assets/starfish.png",zone:"sunlight"}
];

const leftPanel=document.getElementById("leftPanel");

/* CREATE */
animals.forEach(a=>{
let d=document.createElement("div");
d.className="animal";
d.innerHTML=`<img src="${a.img}">`;
d.dataset.zone=a.zone;
drag(d);
leftPanel.appendChild(d);
});

/* DRAG */
function drag(el){
let ox,oy;

el.onpointerdown=e=>{
ox=e.offsetX;oy=e.offsetY;
el.setPointerCapture(e.pointerId);
el.style.position="absolute";
}

el.onpointermove=e=>{
if(el.hasPointerCapture(e.pointerId)){
el.style.left=e.clientX-ox+"px";
el.style.top=e.clientY-oy+"px";
}
}

el.onpointerup=e=>{
el.releasePointerCapture(e.pointerId);
drop(el);
}
}

/* DROP */
function drop(el){
document.querySelectorAll(".dropzone").forEach(z=>{
let r=z.getBoundingClientRect();
let e=el.getBoundingClientRect();

if(e.left<r.right && e.right>r.left && e.top<r.bottom && e.bottom>r.top){

if(z.dataset.zone===el.dataset.zone){
correctSound.play();
z.appendChild(el);
el.style.position="relative";
}else{
wrongSound.play();
reset(el);
}
}
});
}

function reset(el){
el.style.position="relative";
el.style.left="";
el.style.top="";
}

</script>

</body>
</html>
